# Flight checklist for the type skill — 3 stages, hard GATEs.
# SKILL.md addresses stages by NAME (checklist verify <name> / check <name> <id>),
# so the 0-based index never surfaces. STAGE N headings in SKILL.md map to these
# stages in order: scale -> spacing -> i18n.
# Stage count is 3; the `scale` stage owns the type scale, fluid sizing, pairing,
# measure, optical details, and the no-CLS fallback stack; the `spacing` stage owns
# the rem-based spacing scale; the `i18n` stage owns BiDi/RTL, CJK, complex scripts,
# IME composition, Unicode internals, the Intl arsenal, and locale routing.
phases:
  - name: scale
    checks:
      - id: type-scale-and-rhythm-systematized
        description: "A modular type SCALE committed as TOKENS before any component is sized. One ratio chosen deliberately (≈1.125 dense UI → 1.333 editorial; NOT arbitrary px) generating ~6–7 semantic roles (display / h1–h3 / body / small / caption) — components reference roles, never magic px. Every step expressed fluidly with clamp() containing a rem intercept (pure vw violates WCAG 1.4.4). Hierarchy is two axes: size × weight, both tokenized (each weight role named). Measure on running text is ~45–75ch, implemented with max-width: 65ch; line-height is set PER ROLE (display 1.0–1.2, body 1.5–1.65), never per-element. Font pairing is deliberate: concord or contrast, not conflict; 2 families default, 3 ceiling; x-height shared. The optical tells that separate pro from amateur are addressed: negative letter-spacing on large display (em units), tabular-nums + lining-nums on any number in a column or updating in place, slashed-zero for code/IDs, true font-variant-caps: small-caps (not scaled fakes), font-kerning: normal, case + cpsp for all-caps runs, styleset exploration (ss01–ss20). Every webfont has a metrics-compatible @font-face fallback (size-adjust / ascent-override / descent-override) so a late font swap causes ZERO layout shift. font-display: swap or optional; critical fonts preloaded; CJK faces subsetted."

  - name: spacing
    checks:
      - id: spacing-scale-systematized
        description: "A spacing SCALE committed as TOKENS: one base unit (4px for dense data/dashboard UI, 8px for general default) generating a semantic stepped set (xs/sm/md/lg/xl/2xl/3xl) — every gap, padding, margin, and gutter references a step, NEVER a magic px (no padding: 13px, no per-component gutter). The scale shares the type scale's rem-based rhythm so spacing and vertical rhythm agree (one rem unit, one system). Density is a SINGLE KNOB: --space-base re-tuned once for compact vs airy — individual component padding is NOT adjusted to change density. gap is preferred over margins for flex/grid inter-element spacing. All spacing properties use LOGICAL forms (padding-inline, margin-block, inset-inline) — no physical left/right that silently breaks RTL. A spacing value not in the scale does not ship."

  - name: i18n
    checks:
      - id: internationalized-text-and-locale
        description: "Text that survives every language the product will serve, committed as structural decisions before components ship. Logical CSS properties throughout (margin-inline-start, padding-block, text-align: start) — physical direction properties removed; RTL requires NO additional CSS. html dir and lang set at root and at every language-boundary sub-tree. Bidi isolation applied to user-supplied mixed-direction content (<bdi> / unicode-bidi: isolate); source files linted for invisible bidi control characters (Trojan Source / CVE-2021-42574). CJK content has line-break: strict (kinsoku rules). CJK fonts loaded as subsets or dynamically — full font NOT shipped. IME composition handled: validation/search/submit/format NEVER fires while event.isComposing is true; wait for compositionend. string.length replaced by Intl.Segmenter grapheme granularity for any user-visible count, truncation, or cursor movement. Input normalized to NFC before compare/search/store. Case folding uses toLocaleLowerCase(locale) and Intl.Collator, not naive toLowerCase. ALL number formatting via Intl.NumberFormat (locale-correct grouping, currency, percent, units). ALL date/time formatting via Intl.DateTimeFormat with explicit IANA timezone (not fixed offset); timestamps stored as UTC. Relative time via Intl.RelativeTimeFormat; list formatting via Intl.ListFormat; user-facing sort via Intl.Collator. Pluralization via Intl.PluralRules with CLDR categories (zero/one/two/few/many/other) — count===1 is gone. Every UI string with a variable is an ICU MessageFormat (or MF2) parameterized message — NO string concatenation. Locale detection: explicit user choice > Accept-Language > inferred; NEVER IP-redirect. Locale in URL; hreflang on alternates; fallback chain defined (zh-Hant-HK → zh-Hant → zh → en). Locale bundles lazy-loaded. Per-script font fallback stacks cover every script the product uses. Layout tested with pseudo-localization (~30% string expansion) — no fixed widths sized to English strings. SSR hydration: date/number formatted on one side, or explicit locale+timeZone passed to both."
