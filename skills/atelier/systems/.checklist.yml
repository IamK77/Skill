# Flight checklist for the systems skill — 3 phases, hard GATEs.
# SKILL.md addresses phases by NAME (checklist verify <name> / check <name> <id>).
# STAGE 0 — token architecture → gate; STAGE 1 — living library → gate;
# STAGE 2 — handoff + audit → FINAL GATE (checklist show + checklist done).
phases:
  - name: token-architecture
    checks:
      - id: one-source-of-truth-established
        description: "The token taxonomy — color / type / space / radius / motion — is defined in ONE source: either CSS custom properties in a single @layer tokens block, OR a JS/JSON token module that generates the CSS (Style Dictionary or equivalent), OR a CSS-in-JS theme contract (vanilla-extract / Linaria) that emits real custom properties. The palette is NEVER maintained in two languages simultaneously (no CSS custom property AND a JS color object that re-type the same values). The three-layer architecture is in place: raw/primitive names → semantic/alias names → optional component-level hooks. Components consume only semantic tokens (Layer 2) or their own declared component tokens (Layer 3) — never raw names or literals. A CI step (grep or token-audit script) runs on every PR and fails the build on any literal hex / magic px found in component source. The CSS↔JS boundary is closed: if styles also live in JS (inline-style objects, chart libraries, canvas), they read from the one source — CSS custom properties via var() strings or getComputedStyle(), or from the generated JS module — never hand-retyped. Inline style attributes reference token var() strings, not literals (inline styles beat all class-rule specificity; a literal there outranks the entire token system)."
      - id: layer-and-scoping-discipline
        description: "@layer declaration order is explicit and committed: reset < base < tokens < components < utilities. Third-party CSS is wrapped in a named layer so unlayered author rules win without specificity hacks. Semantic tokens are overridden per theme in a [data-theme] scope (or @media (prefers-color-scheme: dark) for zero-JS baseline) — never by inverting raw values. @property is used for tokens that will be transitioned/animated (typed custom properties interpolate; untyped ones snap) and for component API tokens whose type should be machine-readable. Subtree scoping (@scope or targeted class overrides) is in place for any component that needs local token re-pointing (dark sidebars, brand-colored banners) — without a JS theming runtime."

  - name: living-library
    checks:
      - id: primitive-to-pattern-hierarchy-established
        description: "The component library follows a clear primitive → composition → pattern hierarchy. Primitives (Button, Input, Badge, Icon) own one responsibility, consume tokens only, and expose a small documented component token API (--button-bg, --button-radius) for overrides — no literal values anywhere in primitive source. Compositions (FormField, CardHeader) assemble primitives without reimplementing them; overrides flow through the primitive's component token API. Patterns (SearchCombobox, DataTable, EmptyState) are complete reusable solutions, each documented with every state (empty / loading / error / populated) and an accessibility contract. Composition is preferred over configuration: boolean-prop explosions are replaced by composition slots or semantic variant enumerations (intent='primary|danger') rather than visual flags. Anything used in three or more places is a composition or pattern candidate."
      - id: system-documents-itself
        description: "Each component has Storybook (or equivalent) stories that are the canonical example — running code, not screenshots. Visual-regression tests (Chromatic / Percy) run against stories on every PR; an appearance change that was not explicitly approved fails CI. Prop tables are auto-generated from TypeScript types and JSDoc — no hand-maintained docs that can drift from source. Accessibility contracts are tested in-story (axe-core / jest-axe); a missing aria-label fails the test. A stability tier is declared for each component: Stable (locked API, full coverage, visual-regression baseline), Beta (in use, API may change), or Experimental (unstable, clearly labeled). The tier communicates API stability, not quality. Deprecated props and tokens fire a dev console.warn and have a one-major-version removal window."

  - name: handoff-and-audit
    checks:
      - id: design-to-code-contract-defined
        description: "Handoff is a structured diff, not a Figma link. Design hands to code: (1) token changes as a PR to the token source — not a 'use this blue' comment; (2) component API changes specced in the existing component token language; (3) new patterns as a Storybook story spec with all states, token usage, and accessibility contract; (4) explicit acceptance criteria that CI can verify (passing story, passing axe-core, visual-regression diff below threshold, zero literals in token audit). Figma is an exploration tool, not the source of truth — when Figma and code diverge, code wins and the design file is updated to match. The Figma token plugin (Tokens Studio or equivalent) reads from the token source; it does not author it. A designer proposing a token change opens a PR; the sync does not flow from Figma to code."
      - id: drift-audit-is-structural-not-manual
        description: "Drift is caught by CI on every PR, not by a scheduled design review. The four audit channels are all wired: (1) a literal-grep step fails the build on any hex / magic px in component source outside the token files; (2) a cross-language duplication check finds the same value maintained in both CSS and JS (run Style Dictionary or a normalization script); (3) a theme-parity check confirms every component token present in the light theme also has a value in the dark theme (missing value triggers IACVT, not a graceful fallback); (4) visual-regression against Storybook baselines catches unintended side-effects of token changes. Generated outputs (dist/tokens.css, dist/tokens.js) are build artifacts — never hand-edited, optionally not committed (regenerated in CI). No token change bypasses a PR review. This is the pre-condition surface:bulwark requires to enforce the system at 1→N."
