# Flight checklist for the form skill — 3 stages, hard GATEs.
# SKILL.md addresses stages by NAME (checklist verify <name> / check <name> <id>),
# so the 0-based index never surfaces. STAGE N headings in SKILL.md map to these
# stages in order: light -> shape -> texture.
# Stage count is 3; each stage carries ONE check.
phases:
  - name: light
    checks:
      - id: one-light-model-z-scale
        description: "Depth derives from ONE consistent light model — a single light direction chosen and written down; every shadow in the UI shares that direction (only size and softness vary per elevation step). Shadows are LAYERED (3–6 layers, doubling offset/blur per layer, per-layer alpha 0.02–0.06 — not a lone fuzzy box-shadow), with a tight contact shadow layer (offset 0–2px, blur 0–2px) that grounds the element, a top-edge highlight (inset 0 1px 0 rgba(255,255,255,.06–.12)) on the raised face, and a surface gradient (L delta 1–3%, direction agrees with the light). Shadow color is TINTED — surface hue, lower L, slightly higher C — never pure black. Elevation maps to a tokenized z-scale with exactly four named steps (resting / raised / overlay / modal), each encoding the full shadow recipe as a CSS custom property (--z-resting etc.); components reference a token, never a literal box-shadow value. z-index order agrees with elevation order. Dark mode uses surface brightness lift (each higher step raises surface L) rather than deeper shadows, with the top-edge highlight carrying the primary elevation signal on dark surfaces. Every depth cue traces to the system; no ad-hoc box-shadow values remain."

  - name: shape
    checks:
      - id: concentric-radii-and-shape-language
        description: "A tokenized radius SCALE committed (--radius-xs through --radius-2xl plus --radius-full), each step mapped to a role (chip / input+button / card / modal / pill) — no magic border-radius values. Concentric nesting LAW applied everywhere: inner-radius = outer-radius − padding, recursively at every nesting level; when outer-radius − padding ≤ 0, the inner element gets border-radius: 0 (never a negative value, never the same radius as the outer container). Rounded containers with child content (images, dividers, inset panels) have overflow: hidden or equivalent clip so content does not bleed past the corner. Shape LANGUAGE is a deliberate choice: round / bevel / scoop / notch / squircle — the brand archetype implies a shape temperature and that choice is explicit, not defaulted. Squircle / superellipse (n ≈ 4–5, or Figma corner smoothing 60–100%) is applied to large prominent surfaces if the design calls for it, via CSS corner-shape (checking browser support) or SVG / clip-path fallback. Directional asymmetric radii (tab, bottom sheet, chat bubble) are used only where they encode real semantic meaning (attached to / pointing toward). Full-bleed elements touching the viewport edge drop the radius on the touching sides."

  - name: texture
    checks:
      - id: gradient-texture-with-intent-and-no-banding
        description: "Every gradient and texture element has a NAMED JOB — depth (surface gradient, scrim), focus (mask fade, edge fade, vignette), or brand (hero, ambient aurora) — before it ships; any gradient or texture that cannot be named is removed. INTERPOLATION: every gradient specifies `in oklab` (direct mix) or `in oklch` (hue-wheel travel with a `shorter hue` or `longer hue` directive) — never default sRGB interpolation (the dead-gray midpoint between saturated colors is a production defect). TRANSPARENT-BLACK TRAP: every fade-to-transparent uses same-color zero-alpha (oklch(L C H / 0)) not the CSS keyword `transparent` (which is rgba(0,0,0,0) and produces muddy dark midpoints). BANDING: large subtle gradients — surface gradients, hero backgrounds — have grain dithering applied: a precomputed noise texture (blue-noise preferred, SVG feTurbulence acceptable) at 0.02–0.05 opacity on a pseudo-element with mix-blend-mode: overlay or soft-light; never regenerated per frame (cache as data-URI or static image). SCRIMS: fade alpha uses eased multi-stop curves, not linear, so the transition does not produce a visible line at 50% opacity. AURORA / MESH: if present, limited to 2–4 color blobs at moderate saturation, content appears over a scrim of sufficient contrast, animation is stopped under prefers-reduced-motion, and the color stops are tokenized (not hand-tweaked per session). TEXTURE: opacity 0.02–0.05 on a pseudo-element; text above texture remains readable (no contrast failure). All gradient and texture values trace to the system; no decorative gradients or textures remain outside a named job."
