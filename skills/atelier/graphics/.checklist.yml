# Flight checklist for the graphics skill — 4 stages, hard GATEs.
# SKILL.md addresses stages by NAME (checklist verify <name> / check <name> <id>),
# so the 0-based index never surfaces. STAGE N headings in SKILL.md map to these
# stages in order: fallback -> icons -> imagery -> canvas.
# Stage count stays 4; the `canvas` stage (STAGE 3 — Canvas/WebGL/GPU) is the final gate.
phases:
  - name: fallback
    checks:
      - id: dom-first-and-fallback-contract
        description: "The DOM-first principle is applied: every canvas or WebGL surface has a NAMED REASON for leaving the DOM (SVG handles vectors + semantics up to ~1–5k elements; Canvas 2D handles raster + thousands+ of shapes with no semantic requirement; WebGL/WebGPU handles 3D, 100k+ elements, shaders, GPU compute). The escape threshold is real, not convenience. Every non-DOM rendering surface carries a WRITTEN FALLBACK — one of: fallback content inside <canvas>, a parallel accessible DOM mirror, or a data-table/text alternative. A FRAME BUDGET is set and held: 16.7ms (60fps) for interactive surfaces, a named lower limit for background/decorative ones. CSS transforms and opacity run on the compositor and handle the majority of animation use-cases; canvas/WebGL animation is reserved for work CSS genuinely cannot do. The DOM-first rule and fallback contract are decided and written BEFORE any canvas or WebGL code is authored."

  - name: icons
    checks:
      - id: icon-system-one-family-written-spec
        description: "ONE icon family chosen and held (Lucide / Phosphor / Heroicons / Material Symbols / Tabler — or a custom spec). NO icons from outside the chosen family without being drawn to the same spec. A WRITTEN SPEC exists: grid size (e.g. 24×24), safe-area padding (~2px), stroke-width (one width across the set, correlated with adjacent text weight), corner radius, endpoint style (stroke-linecap / stroke-linejoin matching the family). Optical sizing is respected: circle icons drawn slightly larger than square to read the same size (keyline optical equality); icons sit at ~cap-height optically centered on their text line; at 16px, pixel-fitted or per-size art. The stroke-scaling bug is fixed: vector-effect: non-scaling-stroke, or per-size icons, or per-size stroke-width (NOT just scaling the master). Style-as-state encoding: one primary style (line or solid) is the default; the other encodes state; mixing three styles randomly is not done. Implementation: inline SVG + currentColor (fill/stroke: currentColor) for color-cascade state handling; fixed width/height removed, viewBox kept. Accessibility: decorative icons carry aria-hidden=true + focusable=false; icon-only buttons carry aria-label or visually-hidden text (a button without an accessible name is invisible to SR); hit target ≥44px; icon contrast ≥3:1 (WCAG 1.4.11); icon-only buttons have a keyboard+SR-reachable tooltip. New icons drawn to spec and recorded."

  - name: imagery
    checks:
      - id: imagery-and-illustration-system
        description: "Every image element is ASPECT-RATIO-BOXED: width+height OR aspect-ratio set on every <img> so the browser reserves space before load — no CLS. An ALLOWED ASPECT-RATIO SET is defined and used consistently (e.g. 16:9 / 4:3 / 1:1 / 3:2 / 21:9); random ratios per image are not done. Focal-point cropping: object-fit: cover + object-position. The LCP RULE is respected: the LCP/hero image is NEVER lazy-loaded — it carries loading=eager + fetchpriority=high + a <link rel=preload> in the <head>; everything below the fold gets loading=lazy + decoding=async. FORMAT LADDER: AVIF (~50–65 quality) → WebP (~75–80) → JPEG/PNG fallback via <picture>/<source>; vectors stay SVG. srcset + sizes for responsive resolution. Art direction via <picture> + <source media> for viewport-matched crops (different content, not just smaller file). An image CDN handles resize/transcode on demand. PLACEHOLDER STRATEGY: LQIP / BlurHash / ThumbHash cross-faded on load, or dominant-color block — the reserved box never flashes blank. ILLUSTRATION SYSTEM: a written spec covers line-weight, palette (from brand color scale), perspective, detail level, character-style diversity, texture, shape language; a spot-illustration library (empty state, onboarding, error, success) is one consistent set. PHOTO TREATMENT: color grade / duotone / scrim defined and consistent. DARK MODE: illustration dark variants or currentColor/CSS-var theming; transparent-PNG white fringes resolved (use SVG or correct alpha); logos ship light+dark versions. ALT-TEXT DISCIPLINE: informative → meaningful alt; decorative → alt='' (empty, not missing); functional → alt describes action; complex → short alt + adjacent description; no 'image of' prefix; text baked into images is in the alt. GOVERNANCE: one <Image> wrapper component enforces format, srcset, loading strategy, aspect-ratio, placeholder, and mandatory alt by construction."

  - name: canvas
    checks:
      - id: canvas-webgl-gpu-with-fallback-and-budget
        description: "Every Canvas 2D surface applies the RETINA FIX without exception: canvas backing size = CSS logical size × devicePixelRatio, ctx.scale(dpr, dpr) applied, CSS size held at logical values — canvas is blurry on 2× without this, always. Render loop: requestAnimationFrame (syncs to display, auto-pauses hidden tabs); delta time used for frame-rate-independent motion; clear + redraw each frame. State: save()/restore() around transforms, no state leaks. PERFORMANCE: OffscreenCanvas + Web Worker for off-main-thread rendering; layered canvases (static bg + dynamic fg) to avoid full redraws; dirty rectangles for partial updates; batching by style (fillStyle switches are expensive); Path2D to cache reused paths; getImageData and sub-pixel positioning avoided on the hot path. Hit detection: isPointInPath or offscreen hit-canvas (unique color per object). Text: measureText + manual line-breaking. WebGL surfaces prefer the library ladder (Three.js / react-three-fiber / PixiJS / Deck.gl / p5.js); raw WebGL only for fine control. SHADER CRAFT: GPU execution is massively parallel (SIMT); branches cause divergence (both paths execute) — write branchless with step/mix/smoothstep/clamp; fragment shader = pure function (uv) → color; SDF/raymarching/procedural noise understood and applied where needed; GLSL toolbox fluent (mix/step/smoothstep/clamp/dot/cross/length/normalize/fract/mod). LINEAR COLOR WORKFLOW: math in linear space, encode to sRGB on output; 'washed-out gray' = gamma-space math, fix by decoding first; premultiplied alpha for clean edges. Antialiasing technique chosen (MSAA/FXAA/SMAA/TAA); mipmaps for minification; dithering/blue noise against banding. 3D math: MVP pipeline understood; quaternions for rotation (no gimbal lock); raycasting/picking for screen↔world. PERFORMANCE DIAGNOSIS: bottleneck type identified first (vertex / fillrate / bandwidth / CPU-GPU sync stall); instancing + batching + texture atlases + LOD + culling + texture compression applied appropriately; readPixels/gl.finish kept off the hot path. GPU RESOURCE LIFECYCLE: textures and buffers explicitly released; webglcontextlost handler present and restores on GPU context loss; rendering paused on hidden tabs (Page Visibility). WebGPU compute shaders understood for GPGPU work (particles, physics, ML); support verified before shipping. INTEGRATION: pointer/touch coords mapped via getBoundingClientRect + dpr; ResizeObserver handles canvas resize + dpr; cross-origin images carry crossOrigin for untainted canvas. FALLBACK: <canvas> fallback content, parallel accessible DOM, or data-table/text alternative — one must be present; no canvas/WebGL surface is an AT black hole."
