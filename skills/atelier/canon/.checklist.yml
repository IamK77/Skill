# Flight checklist for the canon skill — 3 stages, hard GATEs.
# SKILL.md addresses stages by NAME (checklist verify <name> / check <name> <id>),
# so the 0-based index never surfaces. STAGE N headings in SKILL.md map to these
# stages in order: language -> targets -> sense.
# Stage count is 3; the `targets` stage (STAGE 1 — Quantified targets) carries FOUR
# checks (contrast · density+ratio · motion · premium-tells).
phases:
  - name: language
    checks:
      - id: point-of-view-derived-and-anchored
        description: "The surface's single POINT OF VIEW is stated in one sentence, DERIVED FROM THE PRODUCT'S OWN FACTS (what it delivers, what it costs the user, what it believes) — not from aesthetics, and not waited for as an external brief: the agent can and must derive it itself. This POV is the anchor every later visual choice is justified against. The direction is fixed: POV → style (the visual language is derived from the point of view), NEVER style → POV (a 'premium-looking' shell picked first and reverse-justified — the exact path into the AI default). The POV is grounded in the product, not the mood: 'a good cold email is read into existence, not generated — the deliverable is the user's voice, the cost was the reading' is a point of view; 'clean, modern, trustworthy' is a mood. The test: if you cannot state it without naming a style or a feeling, you have not found it yet. (Worked: Apple's gift page — POV 'the product disappears; the human moment is the subject' → near-empty white, one playful gesture carries all personality. An outreach tool — POV above → editorial language, the agent's reading shown as footnotes = the proof it read.)"
      - id: visual-language-named-and-non-defaults-specified
        description: "The visual language is NAMED as an organizing principle (not a vibe): what it IS (e.g. 'precise and tool-like — strict grid, functional hierarchy, minimal ornament') and what it is NOT — and it is DERIVED FROM THE POINT OF VIEW above (the answer to 'what must this look like GIVEN that POV', not a style pulled off a shelf). The three AI default attractors are listed explicitly — warm-cream editorial (off-white ground, high-contrast serif, ochre accent) · near-black neon tool (single fluorescent accent, zero radius, dense grid) · newspaper hairline (hairline borders, dense columns, pure neutral) — and each is either ADOPTED on purpose or REJECTED on purpose. Neither adoption nor rejection defaults; both are explicit decisions the human has cleared. Deciding ≠ avoiding: fleeing one attractor by landing on another (e.g. escaping near-black-neon straight into warm-cream-serif) is NOT a decision — if the named language coincides with one of the three attractors, it must be JUSTIFIED FROM THE POV and the archetype (the surface genuinely is editorial), not merely asserted as 'chosen.' The ONE signature element is named: the single dimension where 'bold' is concentrated (a typeface choice, a palette move, a spatial gesture, an accent treatment), with all other dimensions explicitly set to restrained — so the Chanel law ('remove one accessory before leaving') is applied by name, not by accident."
      - id: surface-archetype-chosen-and-documented
        description: "The surface archetype is chosen from the five canonical types — dashboard (scan-first, medium density, orientation-motion-only) · tool (task-focused, low decoration, high precision, near-zero expressive motion) · editorial (reading-forward, long measure, type the hero, motion sparing) · marketing (conversion-focused, signature motion permitted, brand-expressive) · data-dense (maximum information per pixel, tabular numerics, motion absent) — and documented with its governing consequences: the motion budget ceiling, the density grade, and the decoration ceiling the archetype implies. If the surface straddles two archetypes, the PRIMARY is named and its constraints take precedence. The archetype is not a theme ('it feels like a tool') but a CONSTRAINT SET that governs every later lens decision."

  - name: targets
    checks:
      - id: contrast-floors-specified
        description: "Contrast targets are written as NUMBERS, not intentions. Minimum: WCAG 2 floors as the legal baseline (body ≥4.5:1, large text / UI components ≥3:1). Perceptual targets: APCA Lc body text ≥75, large text Lc ≥60, UI/non-text elements Lc ≥45. The secondary-text trap is explicitly addressed — the minimum contrast for secondary/supporting text is named and is not below the WCAG floor 'for elegance.' Non-text contrast (input borders, focus rings, icons, status indicators) ≥3:1 vs adjacent surface is called out. These numbers will be the gates the `color` lens enforces — they must be written now, before the palette is built, so the palette is built to satisfy them rather than patched after."
      - id: density-grade-and-type-ratio-specified
        description: "The density grade is chosen as ONE of three named grades — compact (4px base, tight leading, information-maximizing; suits tool/data-dense archetypes) · standard (8px base, ~1.5 body line-height; suits dashboard/tool) · airy (8–12px base, generous leading, large whitespace; suits editorial/marketing) — with the inter-group proximity rule that follows from it (group-gap ≥ 2× intra-group gap, named as a number). The type-scale ratio is chosen as a SINGLE NUMBER appropriate to the archetype (≈1.2 for compact UI · 1.25 for versatile · 1.333 for editorial · 1.5+ for expressive/marketing) and written down; the `type` lens will instantiate this ratio as a token scale. These two values — density grade and type ratio — are the inter-lens contract; they must exist here, not in the `type` or `layout` lens."
      - id: motion-budget-specified
        description: "The motion budget is set as a CEILING, not a floor. One of four named budgets: none (tool/data-dense — motion only with a named job and a hard duration ceiling of 150ms; any motion without a job name is deleted) · orientation-only (dashboard — state-change confirmation and latency masking only; no expressive animation) · standard (layout transitions + entrance/exit ≤300ms; spring physics only for interruptible/gesture-driven motion; no ambient or decorative) · expressive (marketing — signature motion permitted, spring physics allowed, longer durations ≤500ms with a named purpose; prefers-reduced-motion alternative always provided). The purpose taxonomy is noted as constant regardless of budget: every animation that ships must map to one of (orient on state change / show causality-continuity / mask latency / direct attention). Motion not in the taxonomy is decoration; decoration does not ship."
      - id: premium-tells-quantified
        description: "The 'premium tells' are listed as CHECKABLE CONDITIONS, not feelings. At minimum: neutral gray chroma C ≥ 0.005 in oklch (tinted with brand hue temperature, not pure #888); text-black L ≈ 0.18–0.25 (not `#000`); background near-white L ≈ 0.97–0.99 (not `#fff`); shadow layers ≥ 2 at per-layer opacity 0.03–0.12 (ambient + direct, unified light direction); nested border-radius follows inner = outer − padding (concentric corners); display-type letter-spacing −0.02 to −0.04em; touch targets ≥ 44×44px. Each is binary (checkable later by the color/type/depth/motion lenses). The ones NOT applicable to this specific surface are noted with a reason — omission with a reason is a decision; omission without one is a gap."

  - name: sense
    checks:
      - id: jtbd-check-passed
        description: "The visual language is stress-tested against the user's primary job-to-be-done (JTBD), not the designer's aesthetic preference. The check asks: does the type scale remain readable under time pressure or cognitive load? does the density grade allow the primary task to complete without visual friction? does the motion budget avoid distracting the user mid-task? A visual that is internally coherent but fights the user's JTBD is wrong in kind — the check must conclude either PASS (the brief serves the job) or FLAG (a named tension that requires a decision, e.g. 'editorial density conflicts with scan-first job; resolving toward standard density for the data tables'). A vague 'yes' is not a pass; a named tension resolved is."
      - id: states-and-long-tail-checked
        description: "The brief is verified to survive the real long tail, not just the ideal happy-path fill. Minimum verification set: empty / zero-data / first-run state (does the visual language hold without content?); loading state (does the skeleton / progressive reveal cohere with the brief?); error state (does the typography remain readable under an error message?); overflow (a 200-character label, a table with 10,000 rows, a name containing emoji or CJK); missing data (null / N/A in a data-dense grid). The surface diversity check is included: does the density grade survive on a 375px viewport? does the contrast target hold in forced-colors / Windows High Contrast mode? does the motion budget respect `prefers-reduced-motion`? Each is either confirmed or flagged with an explicit resolution — not skipped."
      - id: surface-diversity-verified
        description: "The brief is verified against the real device spectrum, not the developer's MacBook. Three checks: (1) Input modality — touch targets ≥ 44×44px already in the quantified targets; hover-only states called out and removed or given non-hover fallbacks; (2) Network/capability — if the surface is marketing/editorial, the premium motion budget assumes a capable device; the brief names the fallback for low-end/Save-Data (reduced or none); (3) Accessibility — the contrast floors survive `forced-colors` / `prefers-contrast: more`; the visual language does not rely on color alone to convey meaning (redundant encoding named). Plus the ethics check: the color/size hierarchy serves the user's mental model, not a conversion funnel; friction is intentional; defaults serve the user. If any of these requires a brief amendment, the amendment is made here before the design build begins."
