# Flight checklist for the motion skill — 3 stages, hard GATEs.
# SKILL.md addresses stages by NAME (checklist verify <name> / check <name> <id>),
# so the 0-based index never surfaces. STAGE N headings in SKILL.md map to these
# stages in order: purpose -> gesture -> compositor.
phases:
  - name: purpose
    checks:
      - id: purpose-and-physics-committed
        description: "Every animation on the surface has been classified into the seven-purpose taxonomy (causality / spatial continuity / feedback / progress / attention-and-hierarchy / depth-and-spatial-model / expression-and-brand) — any animation that maps to no purpose has been deleted. Motion intensity is calibrated to the surface archetype (data/tool/dashboard surfaces spend motion only on orientation, causality, and latency masking; re-fire under streaming data does not restart or distract). Easing curves committed as tokens: ease-out for entrances (cubic-bezier(0,0,0.2,1)), ease-in for exits (cubic-bezier(0.4,0,1,1)), ease-in-out for on-screen moves (cubic-bezier(0.4,0,0.2,1)), an expressive asymmetric curve for signature moments. `linear` reserved only for genuinely constant motion (spinner, progress fill, 1:1 drag). Spring tokens committed with damping ratio ζ and response: most site elements at ζ ≥ 0.8 (overshoot ≤ ~1.5%); crisp controls ≈ ζ 1.0 / response 0.2–0.3s; modals/large surfaces ζ 0.9–1.0 / 0.4–0.6s; visible bounce reserved for signature elements only. Duration is a function of distance and size (exit ≈ 0.6–0.8× entrance); first frame of feedback < 100ms; stagger 20–60ms with total duration capped. spring vs curve decision is explicit: interruptible/gesture-driven/velocity-carrying interactions always use a spring; discrete state-to-state transitions with known duration always use an easing curve. The motion budget is a decided system, not invented per animation."

  - name: gesture
    checks:
      - id: gesture-arbitration-declared
        description: "Every gesture conflict on the surface has been identified and resolved with a declared policy. Drag activation threshold > ~8–10px before committing axis (tap is never misread as drag). Axis lock: displacement vector angle within ±~30° of an axis belongs to it; first move locks the axis for the rest of the gesture; diagonal ambiguity resolved by one site-wide policy (dominant-component-first or small deadzone). Core arbitration law: inner scroller owns vertical gestures until it hits its boundary in the gesture direction, then hands off to the outer panel — from the exact boundary point, consuming only the overflow past the boundary (zero-jump constraint). Velocity transfer policy (chain or absorb) is decided once and consistent. `touch-action` is set declaratively on all relevant containers (not left to browser defaults — pan-y for vertical-page/horizontal-carousel, pan-x reverse, none for map/pinch-zoom, manipulation where appropriate). `overscroll-behavior: contain` set on all scrollable overlays to prevent scroll-chaining to body. Gesture physics on release: velocity measured via EMA over last ~50ms window (never whole-gesture average); momentum projected to nearest snap point; flick-to-next fires at |v₀| > ~500 px/s; rubber-band applied on boundary overshoot. Springs used for all release physics. All interruptible spring animations support mid-flight capture (position + velocity round-trip between gesture and spring). All gesture interactions have a non-gesture alternative (close button, keyboard controls, focusable targets). No non-passive `preventDefault` where `touch-action`/`overscroll-behavior` would suffice."

  - name: compositor
    checks:
      - id: compositor-only-reduced-motion-and-60fps
        description: "prefers-reduced-motion is implemented as a re-tuned path (not stripped): vestibular triggers (large translation, scale, parallax, rotation) are replaced with cross-fade or instant cut; necessary feedback is preserved; gesture interactions still work with momentum/bounce replaced by fast fade or instant snap. Flicker ≤ 3×/sec (WCAG 2.3.1). Critical information is never conveyed by motion alone. All gesture interactions have a non-gesture alternative path. Compositor-only properties enforced: only transform and opacity are animated (filter permitted but audited); no animation of width/height/top/left/margin/padding (triggers layout reflow and drops frames). Layout-change animations go through FLIP or View Transitions API (`document.startViewTransition()` + `view-transition-name`), never direct layout property animation. `will-change` is set as a temporary hint (before the animation) and removed after — not left on permanently. Color animations use `oklch`/`oklab` interpolation (not sRGB/HSL which crosses the gray dead-zone). 60fps budget held: only transform/opacity animated, no dropped frames in the Rendering panel, single-interaction main-thread work < ~50ms. Spring integration uses semi-implicit (symplectic) Euler for correct behavior under interruption and target changes. CSS scroll-driven (`animation-timeline: scroll()/view()`) used in preference to JS IntersectionObserver-driven scroll effects where applicable. Latency masking: first visible response to user action < 100ms; optimistic/skeleton state shown when real result is slow so the causal story holds. `transform-origin` is set to the causal source (the trigger element) for causality animations."
