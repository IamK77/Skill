# Flight checklist for the layout skill — 3 stages, hard GATEs.
# SKILL.md addresses stages by NAME (checklist verify <name> / check <name> <id>),
# so the 0-based index never surfaces. STAGE N headings in SKILL.md map to these
# stages in order: grid -> rhythm -> reality.
# Stage count is 3. The `grid` stage (STAGE 0 — Grid, hierarchy & composition) carries
# THREE checks; `rhythm` (STAGE 1 — Measure & spatial rhythm) carries TWO checks;
# `reality` (STAGE 2 — Application-layer states & the long tail) carries THREE checks.
phases:
  - name: grid
    checks:
      - id: grid-and-armature-committed
        description: "An explicit column grid is defined as the layout armature BEFORE elements are placed — column count, gutter width, and baseline unit (4 or 8px) are decided and expressed as tokens, not magic px. The grid constrains alignment; breaks from the grid are intentional and used sparingly (one per composition maximum). Modern intrinsic-responsive grid (repeat(auto-fit, minmax(min(100%, Xrem), 1fr))) is preferred over fixed-column + breakpoint-cascade for content grids. Subgrid is used where nested content must align to the parent grid (e.g., card-grid headers/footers across cards of varying content length). gap replaces child margin for item spacing."

      - id: visual-hierarchy-and-focal-order-decided
        description: "Every composition has ONE clear primary element — the focal entry point the eye arrives at first. Hierarchy is established by at least two of: size · weight · contrast · position · isolation · color. All elements are NOT given equal visual weight (the 'flat/unreadable' failure mode). Focal elements are placed at or near the optical center (~10% above geometric center). Primary elements on text-dense pages are positioned on F-pattern axes (top-left, mid-left); on sparse layouts, on Z-pattern axes (top-left, diagonal, bottom-right). Asymmetric compositions are counter-weighted (large+light balanced by small+dark) rather than left imbalanced. Density pacing is designed (dense sections followed by breathing room) rather than uniformly distributed."

      - id: alignment-discipline-enforced
        description: "Every element aligns to a shared edge or grid column — there are no 'approximately aligned' elements (off by 2–3px reads as broken even if the viewer cannot name it). Text aligns to a common left edge (LTR) or right edge (RTL). Numbers in columns right-align and use font-variant-numeric: tabular-nums. Icon+label pairs are aligned by the icon's optical center (visual center of the glyph), not the bounding box. Hanging punctuation is applied to text blocks where the leading characters are quotation marks, bullets, or dashes. Optical edge alignment is applied to headings and large display text. The layout uses logical properties (margin-inline, padding-block, inset-inline-start) throughout, so alignment is direction-agnostic."

  - name: rhythm
    checks:
      - id: measure-and-reading-column-set
        description: "All running text (body copy, article prose, long-form content) is constrained to 45–75ch (ideally ~65ch) with max-width in ch units (NOT px, so it scales with the typeface and user font-size preferences). Full-bleed sections (hero, imagery, data tables) may exceed the reading column; prose does not. A content-well pattern is established for layouts that mix full-bleed and reading-column content. All measure constraints use rem or ch units so they respect user accessibility scaling (WCAG 1.4.10: no horizontal scroll at 320px / 400% zoom)."

      - id: spacing-scale-applied-consistently
        description: "A spacing scale is committed as tokens (e.g., space-1 through space-32) derived from a single base unit (4px or 8px). Every gap, padding, margin, and gutter references a scale token — there are NO magic px values (no padding: 13px, no margin-top: 22px, no per-component gutter). Proximity/grouping law is quantified and enforced: group-internal spacing is measurably smaller than group-to-group spacing (ratio ≥ 1.5–2×). The spacing gradient mirrors the content hierarchy (tighter nesting = tighter spacing). Component-internal padding uses em so components self-scale; layout-level spacing uses rem so it scales with user font-size preferences. Fluid spacing uses clamp() for values that must breathe between mobile and desktop without step-jumps. Dense-layout contexts (tables, dashboards) use the tighter end of the scale with explicit density tiers."

  - name: reality
    checks:
      - id: application-layer-states-designed
        description: "All three empty-state types are explicitly designed: first-use/blank-slate (value statement + primary CTA + preview), cleared/completed (positive, calm), and no-results (explain why + path out). Empty states are not absent or developer-default (blank div or 'No data found'). Error states are NOT mixed with empty states — they are distinct designs with distinct language. Loading states use skeleton screens (content-shaped placeholders) for content regions and spinners for actions. The loading → loaded transition does not shift layout. Every interactive element has a full state machine: default · hover · active/pressed · focus · disabled · loading · success · error. Micro-interactions follow the 100ms first-feedback rule. Inline validation triggers on blur, not keydown. Forms are single-column by default; multi-column only where justified. Labels are top-aligned; placeholder text is NEVER used as a label."

      - id: form-visuals-and-state-coverage-complete
        description: "Every form input has the full state set: default · focus (visible focus ring) · filled · error · success · disabled · readonly. Error messages are: inline adjacent to the field (NOT only at the top), specific and actionable, and preserve the user's input. Form errors use color + icon + text — never color alone. A form-level error summary with anchor links is provided for forms longer than ~5 fields. Submit buttons: primary action is visually distinct; the submit button is NOT disabled before validation — submission is allowed and errors are shown after. Input heights are ≥ 44px. Inputs use the correct type attribute (email, tel, number) for correct mobile keyboards. font-size is ≥ 16px on mobile inputs to prevent iOS auto-zoom. All inputs have for/id label association; error messages have aria-live + aria-describedby + aria-invalid; grouped fields use fieldset/legend."

      - id: long-tail-and-overflow-handled
        description: "The layout holds its form under: (1) text overflow — overflow-wrap: break-word globally; single-line truncation uses text-overflow: ellipsis with a title/tooltip; (2) numeric extremes — largest plausible numbers fit without overflow in numeric columns; tabular-nums is set on all numeric columns; (3) empty string — every usually-populated field has an explicit empty treatment (hide field, dash, or placeholder — consistent throughout); (4) grid overflow — grid columns use minmax(0, 1fr) or children have min-width: 0 so long content does not overflow 1fr tracks; (5) scrollbar gutter — scrollbar-gutter: stable prevents layout shift when a scrollbar appears; (6) mobile viewport — 100dvh (not 100vh) for full-height layouts on mobile; (7) RTL — logical properties throughout; directional icons mirror under dir='rtl'; (8) text expansion — translated text up to 150% of English length does not break layout; (9) 320px / 400% zoom — no horizontal scroll (WCAG 1.4.10); (10) third-party failure — layout holds its space if a third-party widget is blocked or fails to load."
