# Flight checklist for the color skill — 4 stages, hard GATEs.
# SKILL.md addresses stages by NAME (checklist verify <name> / check <name> <id>),
# so the 0-based index never surfaces. STAGE N headings in SKILL.md map to these
# stages in order: ramp-and-roles -> dark-ramp -> contrast -> data-viz.
# Stage count is 4; the `ramp-and-roles` stage (STAGE 0 — Perceptual ramp & semantic
# roles) carries TWO checks (neutral ramp + accent/semantic family), and the `contrast`
# stage (STAGE 2) also carries TWO checks (contrast hierarchy + non-text/CVD).
phases:
  - name: ramp-and-roles
    checks:
      - id: neutral-ramp-in-oklch-with-temperature
        description: "A neutral ramp committed as TOKENS in oklch (~10–12 steps, named 50…950) with a deliberately chosen TEMPERATURE — either warm (H≈60–80, editorial/human) or cool (H≈250, clean/tech) — at a tinting chroma of C≈0.005–0.03. Not pure gray (C=0): pure gray reads 'default, lifeless'. Steps use PERCEPTUAL L stepping (not linear-equal): denser at the light end (L 0.9–1.0) where surfaces, micro-fills, and hairlines live; sparser through mid and dark. Dark-end steps may lift C slightly (deep neutrals tolerate more chroma). Endpoints carry the brand: page bg is off-white (L≈0.98, not #fff), text-black is a hue-tinted near-black (L≈0.16–0.22, not #000). The temperature is chosen once and held across the entire ramp — never mixed warm and cool in the same system. Raw ramp steps (--neutral-50, --neutral-100, … --neutral-950) are committed as tokens before any semantic alias is defined."
      - id: accent-and-semantic-family-as-tokens
        description: "An ACCENT RAMP (50–950) built with a L slope (light→dark) and C 'hump' (C peaks at steps 500–600; near-white and near-black ends can't hold high chroma, and perception rejects it). Base (500/600) sits at usable mid-L (≈0.60–0.62), high C — used for primary buttons and links. State derivation by FORMULA not by hand: hover via `oklch(from var(--accent) calc(l - 0.04) c h)`, active/pressed a further −0.06–0.08, disabled by dropping C toward neutral and raising L. Focus uses the base color for the dual ring. The SEMANTIC COLOR FAMILY (success/warning/error/info) sits at the SAME L and near-same C as the accent base, differing only in H — so all four read as one family: success ≈ oklch(0.62 0.16 150), warning ≈ oklch(0.75 0.15 80) (amber, not yellow — yellow at standard L reads harder and fails contrast as text; press to L≈0.55 for text use), error ≈ oklch(0.60 0.19 27), info ≈ oklch(0.62 0.17 240). Each semantic also has a ramp (same L/C slope) for tint bg and dark text-on-tint. THREE-LAYER TOKEN ARCHITECTURE committed: (1) raw/ramp tokens (--blue-500, --neutral-100 — theme-agnostic); (2) semantic/alias tokens (--color-text-primary, --color-surface, --color-border, --color-primary, --color-success-bg — mapped to raw steps, re-pointed per theme); (3) component tokens optional (--button-bg → semantic). Components consume ONLY semantic tokens — never raw ramp steps, never hex. Theme switch = edit only the alias mapping."

  - name: dark-ramp
    checks:
      - id: dark-ramp-re-tuned-not-inverted
        description: "The dark theme is a RE-TUNED RAMP, not `filter: invert()` and not a black/white swap — it is separately designed. Dark base ≈ oklch(0.14 0.008 250) (deep gray L≈0.12–0.18, NOT pure black — pure black causes halation and cannot express elevation). Text ≈ oklch(0.88 0.006 250) (off-white L≈0.85–0.92, NOT pure white — halation blooms text for astigmatic users; also drop chroma of bright text to reduce bloom). ELEVATION in dark = lighter surface (each layer higher L), NOT deeper shadow — shadows nearly vanish on dark backgrounds; a top-edge highlight carries more. Accent/semantic colors on dark: RAISE L to ~0.70–0.75, DROP C ~20–30% (saturated mid-L colors vibrate on dark). Tint backgrounds go dark (banner bg → low-L low-C deep version, not a light tint). Alias re-pointing: light mode uses accent-600 as link color; dark mode uses accent-300/400. The raw ramp stays fixed; ONLY the semantic/alias mapping changes, implemented in [data-theme='dark'] or @media (prefers-color-scheme: dark). The hard rule: no color value is inverted; every dark value is a designed alias re-point."
      - id: three-state-switching-and-fouc
        description: "THREE-STATE switching implemented: light / dark / system — not a binary toggle. System state respects `prefers-color-scheme` live. ZERO-JS BASELINE: @media (prefers-color-scheme: dark) redefines semantic tokens so dark mode works without JS. Explicit override: JS sets [data-theme] on <html> with priority over the media query. Cascade: :root { light } → @media dark { :root { dark } } → [data-theme='light'] { force light } → [data-theme='dark'] { force dark }. `color-scheme: light dark` SET — this tells the browser to render native UI (form controls, scrollbars) per theme; omitting it leaves native controls light in dark mode (the most commonly forgotten line). FOUC PREVENTED: a blocking inline script in <head> reads localStorage and sets [data-theme] before first paint — no flash of wrong theme. SSR: theme preference stored in a cookie the server reads for a correct first-paint class. Persistence: localStorage (or cookie for SSR). Cross-tab sync: storage event. System mode follows live: matchMedia change listener. TRANSITION TRAP AVOIDED: `* { transition: background-color .3s }` animates every element on every switch AND every interaction — use a scoped temporary class instead, or the View Transitions API; respect prefers-reduced-motion."

  - name: contrast
    checks:
      - id: contrast-hierarchy-verified-at-design-time
        description: "Contrast is a HIERARCHY, not one number — roles mapped to neutral ramp steps and verified as PAIRS at design time (before components ship). Never pure black (#000) on pure white (#fff): text-black at L≈0.15–0.25, large bg at off-white L≈0.97–0.99; both carry the neutral temperature hue. Four-tier hierarchy: (1) primary text — ~12–16:1 WCAG, Lc≈90 APCA; (2) secondary text — ~7:1, Lc≈75; (3) tertiary/muted — ~4.5:1, Lc≈60; (4) placeholder/disabled — ~3:1 (disabled is accessibility-exempt but must not be invisible to everyone). THE MOST COMMON FAILURE: secondary text dialed to pale gray 'for elegance' — an aesthetic crutch and usually a flat WCAG 2 failure. Calibration: let step-900 on step-50 hit primary-text Lc, step-700 on step-50 hit secondary, etc. — so contrast is structural. Adjustment: if a pair fails, MOVE WHICH ALIAS STEP IT POINTS TO; never nudge a raw ramp L value to patch one component. WCAG 2 is the LEGAL FLOOR: body 4.5:1, large text (≥24px or ≥18.66px bold) 3:1, UI components/graphics 3:1 (SC 1.4.11), AAA 7:1/4.5:1. APCA Lc is the PERCEPTUALLY CORRECT MODEL (WCAG 3 draft): models polarity + weight + size; Lc targets — 90 body preferred/small-thin, 75 body min/columns, 60 large headings (~24px+) min, 45 non-text/UI min or large-bold, 30 any non-text that must be visible, 15 invisibility threshold. Lc is BOUND to size × weight — fine text needs much higher Lc. WCAG 2 systematically overstates dark-mode contrast (symmetric, ignores polarity); use APCA especially for dark theme verification. Maximum contrast ≠ best: 21:1 (pure black/white) is past the comfort optimum into glare — there is both a lower bound (accessibility) and an optimal band."
      - id: non-text-contrast-and-cvd
        description: "NON-TEXT CONTRAST (SC 1.4.11): input borders, icons, focus rings, chart marks, status indicators all need ≥3:1 against the adjacent color. Agents make borders too pale — inputs vanish. Focus indicators: dual ring at real contrast (not cosmetic). These are verified in the token system, not per-component. COLORBLINDNESS: ~8% of men have color vision deficiency (CVD), red-green most common. WCAG 1.4.1: NEVER convey information by color alone — add luminance difference, icons, labels, or patterns. LUMINANCE CONTRAST IS THE ROBUST CHANNEL: it survives most CVD; hue difference does not. Test designs with deuteranopia / protanopia / tritanopia simulators. The comfort band: disabled states are intentionally low contrast (accessibility-exempt) but must not be invisible to all users — usability and ethics in balance."

  - name: data-viz
    checks:
      - id: data-viz-palette-perceptually-uniform-cvd-safe-and-tokenized
        description: "Data-viz color operates under its own rigor — UI palette rules do not transfer. PALETTE TYPE identified first (decision tree: ordered? no→categorical; yes+meaningful midpoint→diverging; yes+one direction→sequential). CATEGORICAL: unordered, max hue separation at near-equal lightness and chroma (so no one bright color dominates), cap ~6–8 (beyond that 'other' bucket / small multiples / direct labels), use Okabe-Ito 8-color as the CVD-safe categorical gold standard, give the key series the most prominent color. SEQUENTIAL: monotonic lightness ramp (single hue preferred, multi-hue OK if lightness stays strictly monotonic — Viridis is the standard); lightness is the magnitude channel (read far more reliably than hue); never hand-picked. DIVERGING: two sequential ramps meeting at a LIGHT/NEUTRAL MIDPOINT (pale gray/near-white, NOT a third saturated color); ends must be CVD-distinguishable — use blue-orange, blue-red, or purple-green; avoid red-green. RAINBOW/JET ARE BANNED: not perceptually uniform, bright-yellow band creates false boundaries, not CVD-safe. Use Viridis / Magma / Inferno / Plasma / Cividis, or an OKLCH monotonic ramp (fix H, push L monotonically, adjust C — equal data step = equal perceptual step). COLORBLIND-SAFE: Okabe-Ito for categorical; CVD-safe ColorBrewer for sequential/diverging; REDUNDANT ENCODING always (shape, pattern, texture, direct label alongside color — color alone never carries meaning). Test with CVD simulators. GRAY IS THE MOST IMPORTANT COLOR: gray everything un-emphasized, spend color only on signal — direct labels (label colored like the series it names) beat legends. CONTRAST in charts: marks vs plot background ≥3:1 (SC 1.4.11); gridlines and axes use low-contrast neutral to recede; on dark backgrounds recolor (raise L, drop C), never invert. ACCESSIBILITY BEYOND CVD: provide a text alternative or data table (color is invisible to screen readers; the data must be obtainable non-visually). TOKENIZED: --viz-categorical-1 through --viz-categorical-8, --viz-sequential-{1..9}, --viz-diverging-{low|mid|high} — consistent product-wide so the same series always wears the same color; no hand-picked palette per chart."
