# Flight checklist for the holdfast skill — FOUNDATION cut + replication + consensus
# + sharding + fault tolerance, 7 stages, hard GATEs. SKILL.md addresses stages by
# NAME (checklist verify <name> / check <name> <id>), so the 0-based index never
# surfaces. STAGE N headings in SKILL.md map to these stages in order: frame ->
# communication -> ordering -> replication -> consensus -> sharding ->
# fault-tolerance. The final forthcoming stage (coordination) will be appended
# after fault-tolerance when its reference lands.
phases:
  - name: frame
    checks:
      - id: distribution-justified
        description: "The first law applied — distribution justified by a REAL driver (scale: data/traffic too big for one machine; availability: no single point of failure; latency: users too far for one location; or the problem is inherently multi-site), OR the dramatically simpler single-machine option deliberately chosen. Distributing for fashion is the most expensive mistake on the list; a single strong box has shared memory, one clock, and all-or-nothing failure"
      - id: failure-model-named
        description: "The failure model for THIS system named — what can fail (nodes crash; the network delays without bound, drops, duplicates, reorders, and partitions; there is no global clock and no global state) — and the THIRD STATE accepted: every remote operation has three outcomes (success / failure / 'I don't know'), not two, so the design must carry a branch for 'unknown' ('slow' and 'dead' are indistinguishable, so a timeout is a guess)"

  - name: communication
    checks:
      - id: third-state-handled
        description: "Every remote interaction survives 'I don't know': delivery semantics chosen deliberately (at-most-once may lose; at-least-once may duplicate — the common choice; effectively-once = at-least-once + idempotency, since exactly-once DELIVERY is essentially impossible given the third state), and operations made IDEMPOTENT (idempotency keys / dedup table, or naturally-idempotent 'set to X' rather than 'add X') so a duplicate delivery is harmless"
      - id: retry-discipline
        description: "Retries disciplined — bounded, with exponential BACKOFF + JITTER, a retry budget, and a CIRCUIT BREAKER, and ONLY idempotent operations retried. Naive retries are a retry storm that turns a struggling service into a dead one (a Cook cascade). The recipe in one line: timeout + bounded-retry(backoff+jitter) + idempotency key + circuit breaker"
      - id: no-naive-sync-chains
        description: "Deep synchronous call chains avoided or bounded — a sync chain's availability is the PRODUCT of each link's and its latency is the SUM (five 99.9% hops ~ 99.5%); bound with bulkheads, tight inner timeouts, deadline propagation, async where possible. And because services deploy independently at DIFFERENT versions, the message schema is forward/backward compatible (route the API-evolution mechanics to flightline / load-bearing)"

  - name: ordering
    checks:
      - id: no-wallclock-ordering
        description: "Cross-machine events are NOT ordered by wall-clock time — clocks drift and skew (NTP residual is tens of ms and can jump backward, so wall-clock time is non-monotonic), so wall-clock last-write-wins SILENTLY drops data; a monotonic clock is used for durations only, never for cross-machine order. Where order matters it is established by CAUSALITY (happened-before / logical or vector clocks / version vectors), and CONCURRENT writes are DETECTED and resolved (merge / CRDT / app-level), not silently clobbered — remembering you only get the partial (causal) order for free; a true total order costs coordination"

  - name: replication
    checks:
      - id: topology-and-sync-chosen
        description: "The replication topology is chosen DELIBERATELY against the workload, not by default — single-leader (all writes through one node = one authoritative write order, the simplest and most common) vs multi-leader (each site writes locally — fast, partition-tolerant per site, but CONFLICTING concurrent writes are now possible) vs leaderless/Dynamo (quorum reads & writes, highest availability, conflicts handled by the client). And synchronous vs asynchronous replication is named with its bill: synchronous protects the data but a slow/dead follower stalls writes (hurts availability); ASYNCHRONOUS is fast and available but a leader that crashes before propagating SILENTLY LOSES already-acknowledged writes — 'the async follower is safe' is false. Replication (copies of the SAME data) is also kept distinct from partitioning/sharding (splitting DIFFERENT data); they are orthogonal and usually combined"
      - id: failover-split-brain-guarded
        description: "Failover is treated as the dangerous operation it is, every step landing on an earlier enemy: deciding the leader is REALLY dead (not just slow) is the third-state guess from STAGE 0 — only a timeout, never a fact; choosing the most up-to-date follower as new leader itself needs agreement (forthcoming: consensus); and the OLD leader is FENCED (STONITH / fencing tokens) so a merely-slow old leader that revives cannot keep accepting writes — the SPLIT-BRAIN that corrupts data with two leaders. It is also acknowledged that asynchronous writes not yet propagated at cutover are LOST (and must not be silently resurrected later)"
      - id: conflict-and-lag-faced
        description: "Concurrent writes (multi-leader / leaderless) are DETECTED and resolved, never wall-clock last-write-wins (that silently drops data — STAGE 2's lesson applied): use version vectors to detect conflicts and merge / CRDT / app-logic to resolve; remember QUORUM (W + R > N) guarantees overlap but is NECESSARY-NOT-SUFFICIENT — concurrent writes inside the quorum still need conflict detection. And replication-LAG anomalies under asynchronous/eventual replication are named and the needed guarantee chosen where it matters: read-your-writes (see your own write), monotonic reads (time doesn't go backward), consistent-prefix (writes seen in their committed order — never an effect before its cause) — and EVENTUAL consistency is not mistaken for strong: 'eventually' has no upper bound and says nothing about intermediate reads"

  - name: consensus
    checks:
      - id: consistency-model-chosen
        description: "A consistency model is chosen EXPLICITLY, and it is the WEAKEST one still correct for this use case — stronger is not 'better', it is more expensive. The spectrum, strong to weak: LINEARIZABLE (behaves as a single copy; every op appears to take effect atomically at an instant and respects REAL-TIME order — once a write completes, every read that begins after it sees it or a newer value; this is 'strong consistency') > SEQUENTIAL (a single total order consistent with each process's own program order, but NOT required to match real time) > CAUSAL (causally-related ops are ordered, concurrent ops may be seen in different orders — the STRONGEST model still achievable under a network partition) > EVENTUAL (replicas converge eventually, no order or freshness guarantee in between). Terms are not conflated: linearizability (single-object real-time recency) is NOT serializability (multi-transaction isolation — together they are strict serializability), and neither is ACID's C (an application invariant, unrelated to distribution)"
      - id: cap-pacelc-faced
        description: "The CAP trade-off is faced as it really is, not the pop 'three-choose-two'. A partition is NOT optional — the network is unreliable, partitions WILL happen — so CA is not a real option for a distributed system; the only real question is: WHEN a partition occurs, sacrifice Consistency (linearizability) or Availability (every request answered)? — i.e. CP vs AP. CAP's C and A are narrow and say NOTHING about the normal, partition-free case, so PACELC completes it: if Partition then A-vs-C, ELSE (normal operation) Latency-vs-Consistency. The everyday truth: COORDINATION HAS A COST — even with no partition, stronger consistency is bought with higher latency (you must coordinate and wait). Strong consistency costs availability under partition and latency always"
      - id: consensus-used-well
        description: "Consensus (nodes agreeing on a value or an ordered log despite crashes on an async network) is used WELL: NOT hand-rolled (notoriously easy to get subtly wrong — use etcd / ZooKeeper / a mature Raft or Paxos library), and used SPARINGLY because it is expensive (coordination latency + needs a reachable MAJORITY). Reserve it for what truly needs a single source of truth — leader election, configuration, metadata, atomic commit — and run the data plane on weaker, cheaper models where possible. Limits understood: it needs a MAJORITY quorum (ODD-sized clusters of 3 or 5; tolerates floor((n-1)/2) failures; the MINORITY side of a partition cannot make progress — that IS choosing CP), and FLP means no deterministic async algorithm can guarantee termination if even one node may crash, so real algorithms keep SAFETY always and obtain LIVENESS only under timing assumptions (partial synchrony) or randomization. Strong consistency is built ON consensus — a fault-tolerant linearizable replicated state machine (Paxos / Raft: majority quorum + leader/term + replicated log)"

  - name: sharding
    checks:
      - id: partition-key-fits-access
        description: "The partitioning scheme AND the partition key are chosen to FIT THE ACCESS PATTERN — the single most important decision in a sharded system: pick the key so the operations you care about stay within ONE shard (co-locate data that is accessed together), because a mis-aligned key taxes every later query and transaction with cross-shard cost. Scheme trade-offs understood: RANGE partitioning (contiguous key ranges) gives efficient range scans but HOTSPOTS on a monotonic key (a timestamp key sends all new writes to the last shard); HASH partitioning spreads load evenly but kills range scans and — critically — naive `hash mod N` is a rebalancing DISASTER (changing N moves almost every key), so use CONSISTENT HASHING (only ~K/N keys move when a node joins or leaves) or a FIXED, large partition count (move whole partitions, never individual keys). And partitioning (different data split across nodes, for SCALE) is kept distinct from replication (the SAME data copied, for FAULT TOLERANCE — STAGE 3): they are ORTHOGONAL and LAYERED — each shard is itself a small replicated cluster, so replication and consensus (STAGE 3/4) run again INSIDE every shard"
      - id: skew-and-secondary-indexes-handled
        description: "SKEW is treated as the permanent enemy it is — real load is power-law, so the 'uniform distribution' assumption rarely holds. Hashing fixes order-clustering hotspots but NOT a single hot key (a celebrity account, a viral post — it always hashes to the same shard); that needs application-level relief: split the hot key across shards with a random prefix/suffix (and re-gather the fragments on read). And the SECONDARY-INDEX cost is faced honestly — there is no free option: a LOCAL (document-partitioned) index keeps writes cheap (each shard indexes only its own data) but a query by the indexed field must SCATTER-GATHER across all shards; a GLOBAL (term-partitioned) index makes reads efficient (go straight to the shard holding that term) but writes expensive and complex (one write may have to update index partitions on other nodes, usually asynchronously — so the index lags)"
      - id: rebalance-and-routing-safe
        description: "Rebalancing and request routing are made safe. REBALANCING moves the MINIMUM data, stays online, and distributes fairly — never `hash mod N` (whole-cluster migration); and the dangerous combination is recognized: FULLY-AUTOMATIC rebalancing + automatic failure detection can mistake a merely-SLOW node (STAGE 0's slow-vs-dead) for a dead one, kick off a huge data move, and drag an already-strained system into a CASCADE (a Cook failure) — so keep a HUMAN IN THE LOOP for rebalancing. ROUTING needs the partition->node map, which changes as data rebalances; that map is consistent cluster METADATA, typically kept in a coordination service (ZooKeeper / etcd) that works by CONSENSUS (STAGE 4) — so the routing metadata is itself a consensus problem (consensus reappears). And CROSS-SHARD operations are MINIMIZED because they are the painful part: cross-shard JOINs need a shuffle (expensive -> denormalize and co-locate related data), and cross-shard TRANSACTIONS need distributed coordination (2PC — forthcoming) that is slow, fragile, and costs availability -> design so the transactions you need stay within a single shard"

  - name: fault-tolerance
    checks:
      - id: failure-model-and-detection-honest
        description: "The failure model being tolerated is NAMED, and failure detection is treated as the GUESS it is. Pick how bad a node can get and design for exactly that: CRASH-STOP (works correctly or halts forever — simplest: detect and route around); CRASH-RECOVERY (crashes then returns, maybe with stale persisted state, maybe as a ZOMBIE — needs careful state recovery + fencing, STAGE 3); OMISSION (drops some messages — the unreliable network of STAGE 0); BYZANTINE (arbitrary / lying / telling different peers contradictory things — buggy, corrupted, or malicious). Cost scales with malice: tolerating f CRASH failures needs 2f+1 nodes, f BYZANTINE failures needs 3f+1 — so DON'T pay for BFT inside a trusted datacenter (default to non-Byzantine crash faults; reserve BFT for untrusted participants — blockchain, aerospace bit-flips, adversarial settings). And DETECTION is heartbeat + timeout, which CANNOT reliably tell 'dead' from 'slow' (STAGE 0's slow-vs-dead), so it is a guess with a dilemma: too-SHORT a timeout = fast detection but FALSE POSITIVES (a slow-but-alive node declared dead -> needless failover, flapping, the STAGE 5 rebalance cascade); too-LONG = fewer false positives but slow discovery. Prefer an accrual detector (phi-accrual — a continuous suspicion level that self-adapts to jitter) over a binary dead/alive verdict, and respect that a false positive is often MORE destructive than the original slowness (Cook: change introduces new failure modes)"
      - id: redundancy-without-correlation
        description: "Single points of failure are eliminated with REDUNDANCY — but only where failures are INDEPENDENT, because redundancy masks only independent faults. Find the component whose loss takes everything down (the one load balancer, the one coordinator, the one shared library) and add spares — AND defeat CORRELATED failure: replicas in the same rack, same availability zone, on the same power feed, or running the same buggy software version can all die from ONE event, making the redundancy illusory. So spread redundancy across FAULT DOMAINS (rack / AZ / region) and avoid shared dependencies. Failover and recovery are done right: detection is imperfect so cut over cleanly, FENCE the old component (no zombie / split-brain — STAGE 3), and don't lose in-flight state; a recovering node must CATCH UP (replay log, sync state) before it serves, must never serve stale data, and must be safely re-admitted. And because failure is inevitable, optimize MTTR (mean time to RECOVERY — fast, automatic recovery) over MTBF (mean time between failures): recovering quickly beats chasing 'never fails'"
      - id: blast-radius-contained
        description: "When part of the system fails it DEGRADES GRACEFULLY instead of collapsing whole, and the blast radius is CONTAINED. Graceful degradation: return cached / stale data, shed non-essential features, drop excess load, give partial results — fail SOFT, not total. Contain the cascade (Cook: disasters are cascades) with explicit defenses — BULKHEADS (compartmentalize resources, e.g. a separate thread/connection pool per dependency, so one failure can't drain them all), CIRCUIT BREAKERS (stop calling a persistently-failing dependency: open after N failures, fail fast, probe periodically — killing the retry storm of STAGE 1 and resource-exhaustion cascades), BACKPRESSURE / LOAD-SHEDDING (push back or drop excess — reject early rather than die wholesale), and TIMEOUTS everywhere (never wait forever on a dependency — STAGE 1). The unifying aim is to keep one part's failure from sinking the whole (Cook's defense-in-depth, in code). And the system is DESIGNED FOR FAILURE as the default path, then that design is EXERCISED — chaos engineering (inject real failures: kill nodes, add latency, partition the network; game days) — because a system whose failure modes you have NEVER exercised is one whose real reliability you do not actually know"
