# Flight checklist for the prospect skill — the research-gap prospecting pipeline,
# 6 stages, hard GATEs. SKILL.md addresses stages by NAME (checklist verify <name>
# / check <name> <id>), so the 0-based index never surfaces. STAGE N headings in
# SKILL.md map to these stages in order: frame -> mine -> filter -> rank -> kill ->
# land. The terminal stage 'land' produces the three deliverables that mean the
# literature review is DONE: a one-page gap statement, a core-paper comparison
# table, and 1-2 reproduced baselines running on the user's machine.
phases:
  - name: frame
    checks:
      - id: scope-bounded
        description: "The hunting ground is BOUNDED before any mining — problem setting × method families × target venues × time window — concretely enough that 'is this paper in scope?' has a yes/no answer. Too wide and the miner drowns in noise; too narrow and you only re-find the red ocean everyone is already crowded into. This bounded range is the INPUT the agent departs from to hunt — gap-finding is not 'survey everything', it is 'hunt this defined ground exhaustively'"
      - id: hunt-survives-stronger-models
        description: "The TIME-DISCOUNTING / bitter-lesson check is applied to the scope: you are hunting a STRUCTURAL problem that survives stronger general models and more capable agents (optimality / approximation guarantees, verifiability, large-scale solve efficiency, hard problem structure), NOT a contribution whose essence is 'complex hand-design patching a model's CURRENT weakness' — that risks being steam-rolled by the next model generation. Ask of the area: will this still be an open problem in two years when the models are much stronger? Frame the scope so the answer is yes (in CS×OR, structural guarantees and efficiency don't evaporate because an LLM got better)"
      - id: source-verification-set
        description: "The anti-hallucination discipline is set BEFORE the first agent search, because the agent is the MEANS (parallel miner + adversary), never the ORACLE and not (here) the research object. Its two signature failures in this stage are CITATION HALLUCINATION (inventing a plausible paper) and reading an abstract's RHETORIC as an experimental CONCLUSION. So the rule is fixed up front: every paper the agent surfaces has its title AND its core claim verified against the actual source before it enters your library (the map is not the territory), and the agent is to be commanded ADVERSARIALLY, never invited to agreeably confirm what you hoped to hear"

  - name: mine
    checks:
      - id: seams-run-in-parallel
        description: "Candidate gaps are MINED, not waited for — at least three or four of the SEVEN SEAMS are run IN PARALLEL (each blind to the others, for cross-coverage), not a single search thread: (1) LIMITATION-CLUSTERING — batch-read 50-100 recent in-scope papers, extract ONLY the limitation / future-work / admitted-failure passages, cluster by theme, count frequency and earliest-mention year; high-frequency, cross-paper, three-years-unsolved = a community-acknowledged unfilled hole whose importance the original authors already argued for you. (2) MATRIX / CROSS-BLANK — lay the field on a 2-D grid (method line × problem setting), fill each cell with paper count + representative work; blank and sparse cells are candidates. (3) ASSUMPTION-AUDIT — extract the assumption each method depends on (convexity, stationarity, full information, demand independence, scale cap, unlimited solve time); an assumption shared by ALL papers but plainly false in reality is a ready-made gap with a built-in story ('all existing methods assume X; in practice X fails; we are the first to relax it'). (4) LEADERBOARD-WEAKNESS — pool every main-results table into ONE big table (unified datasets/metrics); find instance classes where everyone's best is still bad (hard-bone gap) or methods that win on class A and collapse on class B (robustness gap). (5) REPRODUCTION-ARBITRAGE — pick fast-rising-citation papers you suspect (old-only baselines, missing key ablation, single seed) and reproduce them. (6) CROSS-DOMAIN TRANSPLANT — diff your field's techniques against an adjacent field's last-two-years and find a technique mature in A but absent in B. (7) TREND ARBITRAGE — keyword distribution over three years to find rising-but-still-rare subfields, plus a rolling scan of last-60-90-day arXiv + tool releases (new solver / model / benchmark) asking 'what just became possible that wasn't before'"
      - id: candidates-listed
        description: "The mining produces a concrete CANDIDATE LIST of roughly 10-20 gaps, WRITTEN DOWN — not a vague sense of direction. Each candidate names which seam surfaced it and states the hole in one line. This list is the raw ore the filter stage refines; under-producing here (2-3 candidates) is the tell that the seams were not run broadly or in parallel enough — go back and mine more before filtering"
      - id: dimensions-are-yours
        description: "The DIMENSIONS that decide what you can even SEE are chosen by YOU, not the agent — this is the FIRST of the three non-delegable judgments. How the matrix axes are cut and how the limitations are clustered determines which gaps become visible at all; a field sliced by the wrong axes hides its real openings. The agent fills the cells; you decide what the cells ARE. If you hand the agent the dimensions it proposes and grade its own homework, you have outsourced the one judgment that shapes everything downstream"

  - name: filter
    checks:
      - id: blank-causes-diagnosed
        description: "Every candidate blank has its CAUSE diagnosed — a blank or sparse cell is NOT assumed to be opportunity. It is empty for one of four reasons and only some are gold: (a) NOBODY THOUGHT OF IT — the good gap; (b) DONE, but under different terminology, in an adjacent field, or published low-tier — not a gap, go find it; (c) a FUNDAMENTAL TECHNICAL BARRIER makes it infeasible — only a gap if a NEW tool has just removed the barrier (the trend-arbitrage link); (d) DONE AND POINTLESS — the trap that burns three years on something nobody wants. The agent runs a targeted search per blank to gather evidence for the classification, but the VERDICT on the cause is the SECOND non-delegable judgment. Note a sparse cell (2-3 papers) is often better than a pure blank — someone already validated the direction is feasible, but it is far from worked-out"
      - id: adversarial-search-run
        description: "Each surviving candidate is run through the ADVERSARIAL existence search — the integrity keystone of the whole skill. The agent is NOT asked the soft question 'what related work is there?' (it will gently confirm down the path you handed it, the sycophancy failure); it is commanded the hard one: 'YOUR GOAL IS TO PROVE THIS IDEA HAS ALREADY BEEN DONE. Search with at least FIVE different phrasings — synonyms, the adjacent field's terminology, English AND Chinese — and return the THREE closest existing works with their PRECISE difference from this idea.' This deliberately inverts the agent's please-you gradient into a kill attempt, so a gap that survives is one that survived being attacked, not one that was never challenged"
      - id: survivors-have-precise-delta
        description: "Only candidates that SURVIVE the attack remain, and each survivor carries a PRECISE DELTA against the three closest existing works — a difference you can state in one line and that a domain expert would accept as 'genuinely not done', not a cosmetic relabel of an existing result. A candidate whose delta is vague, or only cosmetic, is DROPPED here — at the cheap stage — rather than defended all the way into the paper where a reviewer kills it as incremental. The quick field-test: state the gap in two sentences to someone in the field and watch for 'right, nobody's really done that' rather than 'didn't so-and-so do that in 2023?'"

  - name: rank
    checks:
      - id: four-questions-scored
        description: "Each survivor is scored on the FUNDABILITY four questions, one point each: (1) is there a RECOGNIZED benchmark so the contribution can be quantified? (2) is there a recent (last-two-years) STRONG baseline to beat HEAD-ON? — beating only old or weak methods is unconvincing and a reviewer will say so. (3) with YOUR actual compute and time, are the MAIN experiments doable in 3-6 months? (4) can the core contribution be stated in ONE clear sentence? A candidate below 3 points is SHELVED for now (not killed — parked), so the bet is placed only among gaps that are quantifiable, competitive, feasible, and articulable"
      - id: ranked
        description: "The survivors are RANKED and the choice of WHICH to bet on is made consciously — the THIRD and final non-delegable judgment. This is pure taste and judgment and cannot be handed to the agent (you may let it play devil's advocate — 'why has nobody filled this in three years, un-thought-of or unimportant?' — but the decision is yours). Bet on the top one or two, with the cheapest-kill experiment (next stage) standing between you and full commitment"

  - name: kill
    checks:
      - id: kill-experiment-designed
        description: "For the top two or three ranked gaps, the CHEAPEST falsification experiment is designed FIRST — before building any full system. The principle inverts the instinct to build: design the experiment that runs in a DAY (a week at the very most) and whose NEGATIVE result directly KILLS the idea — a rough prototype on small instances to see if the trend even holds, or a direct check that the core conjecture the method depends on actually holds in the data. It is not a full implementation; it is the SMALLEST thing that can disprove the bet. An idea with no cheap kill-shot is an idea you cannot yet afford to commit to"
      - id: kill-experiment-run
        description: "The cheapest-kill experiment is actually RUN (a coding agent can stand up the throwaway prototype the same day), and ideas that die cheap are LET DIE EARLY — the cheaper an idea can be killed, the sooner it should be killed, because every week of attachment raises the cost of abandoning it. The gap that SURVIVES its own kill-shot is the one you carry into method design, now backed by empirical confidence instead of hope. Record what the experiment showed (including a negative that retires a candidate) — a killed idea is a successful prospect, not a wasted one"

  - name: land
    checks:
      - id: baselines-reproduced
        description: "The 1-2 baselines you will be JUDGED against are REPRODUCED and RUNNING ON YOUR machine, with their reported numbers matching what YOU personally verified — never the numbers the paper merely CLAIMS. Differences beyond explainable random variation are chased down (different preprocessing? hyperparameters? or water in the original paper?). Reproduction FAILURE is not a dead end but INTELLIGENCE: a 'SOTA' method you cannot reproduce under faithful, fair settings may itself BE your gap (a re-evaluation paper — many venues have a track — or its one genuinely-working component as your starting point). The whole reproduction is captured by the agent as a README + one-button script, because the later large-scale-experiment stage will reuse it repeatedly"
      - id: gap-statement-one-page
        description: "A ONE-PAGE gap statement exists and answers four questions: what is the problem; where have existing methods got to (the SOTA); where EXACTLY is the hole (performance not good enough? assumptions too strong / unrealistic? a theoretical blank? a flawed evaluation protocol?); and by what idea you intend to fill it. This page is pure judgment and taste and is NOT outsourced — the agent may attack it as devil's advocate, but the conclusion is yours. If you cannot fit the gap on one page, you do not yet understand it well enough to bet on it"
      - id: comparison-table-complete
        description: "The CORE-PAPER comparison table is COMPLETE — columns roughly: problem setting · method core idea · theoretical guarantee (if any) · benchmark & metrics · key numbers · code open? · self-stated limitations · relation to your idea. The agent drafts the cells by batch-extraction from the PDFs, but YOU own WHICH papers make the table — the selection criterion IS your understanding of the field taking shape, so it cannot be delegated. Built carefully now, this table is the direct raw material for the paper's Related Work section, making that section nearly free to write later. With this table, the reproduced baselines, and the one-page gap statement in hand, the literature review is DONE — not 'when every paper is read'"
