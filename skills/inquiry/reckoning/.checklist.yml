# Flight checklist for the reckoning skill — turning a finished results store into
# settled claims, mechanism evidence, and paper-grade figures, 7 stages, hard GATEs.
# SKILL.md addresses stages by NAME (checklist verify <name> / check <name> <id>),
# so the 0-based index never surfaces. STAGE N headings in SKILL.md map to these
# stages in order: audit -> distribution -> ablation -> mechanism -> boundary ->
# verdict -> redteam. What reckoning produces is a paper that already exists in
# pieces: every claim with a verdict, the mechanism explained by probes, the failure
# boundary drawn, and every figure script-generated and adversarially survived.
phases:
  - name: audit
    checks:
      - id: count-before-read
        description: "Before reading WHO WON, the full result set is AUDITED against a mechanical checklist (a job to hand the agent, with a report back): is task completion 100%; are failures CONCENTRATED in some method × instance cell (concentration is itself a finding); is every result row's version tag consistent across the table; do the key magnitudes match what exploration and the pilot showed. Skipping the audit and going straight to celebration — then discovering during writing that a column came from a silent bug — is the most classic tragedy of a research career. Core-but-not-read first; read second"
      - id: suspicious-is-bug-first
        description: "For any result that is TOO GOOD, an outlier, or otherwise surprising, the FIRST hypothesis is a bug or an infeasible solution that slipped the feasibility check — NOT a breakthrough. The order of suspicion is fixed: implementation error / infeasibility / mis-specified instance come before 'genius result'. Only after a surprising number survives that suspicion is it allowed to be exciting. (This is the analysis-side echo of forge's independent feasibility checker: the same number that 'soars' is usually wrong, and the discipline is to assume so until proven otherwise.)"

  - name: distribution
    checks:
      - id: distribution-and-slices
        description: "The main table is read through the DISTRIBUTION and SLICES, never the mean alone — because the mean lies: a 5% average win can be 'wins a little everywhere' or 'ties on 90%, wins big on 10%', and those are different papers (the latter often more valuable — it points at a characterizable applicable condition). So: plot the per-instance paired difference (your value minus the baseline) as a distribution; then SLICE by instance feature — scale, constraint-tightness, instance class — to answer 'on which class do you win, on which do you lose'. For OR, add a performance profile (Dolan-Moré), the community's shared language for compressing many-methods × many-instances into one figure"
      - id: statistics-done-right
        description: "The statistics are executed exactly per the frozen protocol AND guarded against the five pitfalls that make a study 'done but wrong': (1) PSEUDO-REPLICATION — the independence unit is the INSTANCE, not instance×seed; aggregate seeds within an instance first (mean/median), then run the paired test across instances (seed variance is reported separately, as stability). (2) CENSORING / survivor bias — never drop timed-out runs from the time stat; report solve-rate as its own metric, compare time only on the intersection both methods solved, and use a penalty convention (e.g. PAR10) for combined metrics, stated explicitly. (3) DIMENSIONAL bullying — don't arithmetic-mean raw objective values across instances of wildly different scale; normalize to a relative gap, or use the shifted geometric mean (the MIP/solver community standard). (4) PERFORMANCE-PROFILE edges — its curve shape depends on the method pool, so profiles across papers are not comparable and you may not delete a strong baseline to 'improve' your curve. (5) SLICE multiple-comparison — pre-declared slices are confirmatory (correct, e.g. Holm, and report); slices invented mid-analysis are exploratory and must be re-confirmed on new data or labeled post-hoc. Report effect size alongside every p-value: p says the difference is real, effect size says whether it is worth caring about"

  - name: ablation
    checks:
      - id: ablation-traps-read
        description: "The ablation table is INTERPRETED, not just tabulated, against three traps. (1) INTERACTION effect — removing A alone or B alone barely hurts but removing both collapses: the honest claim is 'A and B provide redundant protection', NOT 'both contribute significantly'. (2) Contribution DRIFTS with scale — a component useless on small instances but critical on large ones forces the ablation to be reported at TWO scale tiers, or the single-tier conclusion misleads. (3) COUNTERINTUITIVE result — your proudest component ablates to a slight IMPROVEMENT: this is a gold mine, not a nuisance — chase it down to either an implementation bug or a wrong understanding of the mechanism, both far more informative than 'everything as expected'. Every anomalous ablation cell earns a logged hypothesis in the 历程"

  - name: mechanism
    checks:
      - id: probes-not-identical-to-main-result
        description: "Mechanism is verified by deriving, from the mechanism explanation M, a checkable prediction P that is NOT the main result itself — because 'the method is better' cannot be evidence that 'the mechanism holds', since the win is precisely what M is invoked to explain. The probe's measured quantity must also not be a mathematical function or near-relative of the main metric, or probe and main result share one source and two apparent evidences collapse into one. Mechanism probes are the dividing line between a publishable paper and a strong one: winning the main table only shows the method WORKS, not that it works FOR THE REASON YOU CLAIM"
      - id: two-probes-minimum
        description: "At least TWO mechanism probes support the explanation, drawn from the four types (increasing strength): DOSE-RESPONSE (turn the exploited structure from zero to strong via the synthetic generator's knob; the advantage should rise monotonically and vanish at zero — a clean monotone curve beats a single point by an order of magnitude of evidence); COUNTERFACTUAL DESTRUCTION (method untouched, break the structure in the DATA — shuffle the time order, permute a feature, flatten a correlation — and the advantage should disappear; higher-grade than component ablation because it points precisely at 'you depend on this structure'); INTERMEDIATE-QUANTITY (open the black box: an internal quantity should align with an external ground truth the mechanism predicts); TRANSFER PREDICTION (the strongest — M implies a two-way prediction: effective on another problem sharing the structure, and falling back to mediocre where the structure is absent; the NEGATIVE half, predicting your own failure and seeing it land, is the highest-grade mechanism evidence there is). Probes that land upgrade the paper from 'ours is better' to 'we understand why'; a probe that MISSES while the main table still wins means the method works but your story is wrong — fix the story, never bury the miss"

  - name: boundary
    checks:
      - id: failure-edge-characterized
        description: "The method's FAILURE boundary is actively sought and characterized as a conditional statement ('when constraint-tightness exceeds X, the advantage disappears'), then written into the paper's limitations. This is not weakness but PRE-EMPTION: a reviewer will hunt for where you lose, so finding it first — and best, connecting it to the mechanism (the regime is exactly where the mechanism's assumption is violated) — converts a potential desk-reject into evidence the authors understand their method deeply. The transfer-prediction probe's negative half IS this boundary: one experiment, two uses"

  - name: verdict
    checks:
      - id: every-claim-settled
        description: "Every claim in the matrix is SETTLED to a verdict — supported / revised / dropped — and the settling process is recorded. When confirmation contradicts an exploration-phase finding (it happens: the exciting effect shrinks or vanishes on fresh seeds and instances), the response is graded: effect smaller but still significant -> downgrade the claim's wording; effect only in a slice -> CONDITIONALIZE the claim (often a sharper, better paper); effect gone -> DELETE the claim, back to method design or the next variant. The claim is the paper's argument; an honestly-revised claim is a stronger paper than a defended false one"
      - id: forking-garden-disciplined
        description: "The garden of forking paths is defended against — the agent-era danger, because cheap experiments make unconscious cheating cheap (fifty analysis paths overnight, then you keep the prettiest), and every path 'passes its tests'. The RED LINE: never invent a new story from the confirmation data and declare it validated on that SAME data — any pattern found while digging through results is a NEW hypothesis requiring a fresh batch to confirm; the append-only 历程's timestamps make 'did I hypothesize this before or after seeing the data' an auditable fact, not a memory. The constructive use of the same compute: where an analysis choice is genuinely arbitrary (mean vs median), don't choose — run ALL reasonable specifications (multiverse / specification-curve) and report 'the conclusion holds under 95% of reasonable analysis paths'. The agent's compute dividend is spent proving every path converges, NOT finding the one that looks best"

  - name: redteam
    checks:
      - id: adversarial-review-systematized
        description: "Agent adversarial review is run as a SYSTEM, not a vague 'take a look', because the agent defaults to polite, universally-true criticism ('the experiments could be more thorough'). Six practices squeeze out the platitudes: ROLE SEPARATION — separate fresh sessions for a statistics reviewer (attacks only the tests, aggregation, censoring), a domain veteran (attacks novelty, fed the near-neighbor PDFs), a reproduction reviewer (only the repro package + protocol, actually runs the README clean), a story reviewer (only intro + figures, the three-second test); CALIBRATION — feed it the target venue's real review form and real public reviews (e.g. OpenReview) so its 'strict' matches the real distribution; INTENSITY-GRADED prompts ('list at most three fatal flaws ranked by reject-probability', then in a new session 'you have decided to reject this — write the most unanswerable rejection'); CONCRETE TARGETS (for each claim an alternative explanation consistent with the data; for each figure a way it could mislead; for each bold number its convention); DEFEND KNOWN FAILURE MODES (confident prose genuinely lowers its criticism, so review a neutralized version; a long session drifts onto your side, so every review is a NEW session); TIMING FRONT-LOADED (review the protocol BEFORE freeze — highest ROI — then the analysis, then the manuscript). What the agent CANNOT judge — whether the problem matters, whether the direction has taste — stays with human reviewers"
      - id: figures-carry-one-point
        description: "Each figure carries EXACTLY ONE information point, stateable in one sentence ('Figure 3: our advantage grows as instances scale') — a figure that fails that sentence is deleted. The craft is utilitarian: captions self-contained (figure + caption understood without the body text); tables bold the best value, show mean±std, match significant digits to measurement precision (reporting runtime to four decimals advertises you never thought about precision); comparison curves carry confidence bands, not bare means; axes start at an honest zero and any truncation is explicitly marked. Every figure's generation script joins forge's one-command regeneration chain, so 'reviewer wants the figure changed' is a three-minute edit. The agent drafts figures, but you own the one-point list each must carry"
