# Flight checklist for the envoy skill — string the argument the first five steps
# already built into a manuscript, carry it to the right venue, defend it through
# review, and persist up the resubmission ladder. 6 stages, hard GATEs. SKILL.md
# addresses stages by NAME (checklist verify <name> / check <name> <id>), so the
# 0-based index never surfaces. STAGE N headings in SKILL.md map to these stages in
# order: skeleton -> draft -> vet -> submit -> rebuttal -> persist. envoy is the
# last skill of the inquiry suite; it produces the submitted (and, after the
# gauntlet, accepted or laddered-onward) paper plus a finalized reproduction package.
phases:
  - name: skeleton
    checks:
      - id: figures-first-story-fixed
        description: "The paper is built FIGURE-FIRST, STORY-FIRST — not written top-to-bottom from page one. Lay out the figures reckoning produced, pick the six-to-ten the argument actually needs, and order them into a line: that figure SEQUENCE is the paper's skeleton, one figure per argument step. Then write the one-page STORYLINE — the two or three claims plus the single 'one-sentence insight'. That insight is the soul of the paper and it is COGNITIVE, not procedural: not 'we propose method X' but 'X works because we noticed Y' — a statement about understanding. If you cannot write that sentence, the mechanism is not understood yet; go back to reckoning's mechanism stage and add a probe, do NOT paper over it with prose. (The intro is written twice on purpose: a rough version now to force the story clear, a from-scratch rewrite once the whole paper exists and your understanding has moved.)"
      - id: skeleton-reader-tested
        description: "The skeleton is READER-TESTED before any section is drafted: hand the figure sequence — figures plus captions ONLY, no body text — to someone who has not read the paper, or to a fresh agent session, and ask them to restate the paper's thesis. If they can reconstruct the main claims from the figures and captions alone, the skeleton stands. If they cannot, the argument is not yet legible and drafting prose on top of it only buries the problem — fix the figure sequence or the captions first. This is the cheapest possible test of whether the argument holds, run before a single paragraph is written"

  - name: draft
    checks:
      - id: intro-and-contributions
        description: "The intro follows the near-fixed FIVE BEATS and the contributions are disciplined. The five beats: (1) why the problem matters; (2) where existing methods have got to; (3) the GAP — stated, where possible, with the original authors' OWN admitted limitation (from prospect's mining), so the literature argues your gap for you; (4) the one-sentence core insight; (5) the contribution list. Every contribution is VERIFIABLE and maps ONE-TO-ONE to a claim — 'we ran extensive experiments' is not a contribution. The one-sentence insight from the skeleton is the intro's center of gravity. (Write the rough intro now; the final intro is a from-scratch rewrite after the body exists.)"
      - id: body-organized-by-claim
        description: "The body follows its templates, and the Experiments section is organized BY CLAIM. Related work is generated from prospect's comparison table: grouped by THEME, not listed paper-by-paper, each paragraph ending in 'the difference from us' (near-neighbors handled with the fixed difference template from crucible's novelty stage). Method is top-down — one paragraph of intuition and an overview figure, then the formalization — and threads a single RUNNING EXAMPLE the reader follows through the whole method, roughly halving the comprehension cost. The Experiments section is organized BY CLAIM, not by experiment type: each subsection opens with 'this section validates claim X', so a reviewer reading section by section automatically audits your argument. This is the claim-evidence matrix (ledger) projected into the paper"

  - name: vet
    checks:
      - id: evidence-traceable-no-invention
        description: "THE cardinal red line of the writing step: the agent NEVER writes a sentence whose evidence it has not seen. Every number, and every 'experiments show / results indicate' claim in the prose, must trace to a specific run in the results store (a run id) — an agent helpfully inventing a plausible-looking number that slips into the text is among the most lethal classes of submission accident. Two more lines hold alongside it: the story line, the claim wording, and the contribution statements are WRITTEN AND OWNED BY THE HUMAN — that is the paper's soul and its locus of responsibility, the signature is yours; and the target venue's LLM-use policy is checked against the CURRENT official policy (they differ widely and keep changing; most permit polishing but require disclosure, some are stricter) and followed, not guessed"
      - id: manuscript-vetted-and-read-tested
        description: "Before submission the manuscript passes an agent VET and a READER TEST — the agent's two highest-value, fully-legitimate jobs here. The vet is the mechanical consistency sweep the human eye misses and the agent almost always catches: every symbol defined before use, terminology uniform, citation format consistent, and figure/table numbers aligned with their in-text references. The reader test is worth ten times asking 'is this good?': open a CLEAN session, give it only the paper, and have it restate the claims, the method's flow, and each figure's one information point — wherever the restatement goes wrong is the precise coordinate of where you wrote unclearly. (Language polishing and page-limit compression are also the agent's to do; the judgments above are not.)"

  - name: submit
    checks:
      - id: venue-fit-over-rank
        description: "Venue is chosen by FIT over RANK. The first principle: look at where the papers you cite most are published — that is your conversation community, the pool where a reviewer can actually understand you. Choose with the field's structure in mind: CS is predominantly conference-led (fixed deadlines, three-to-six-month cycles, hard page limits, though subfields like theory and the ML journals JMLR/TMLR are journal-led), OR is predominantly journal-led (OR, Management Science, INFORMS Journal on Computing and the like — no deadline, year-scale cycles, but room for heavy theory-plus-experiment). Cross-disciplinary work can go either way; the tiebreaker is which side's language your CORE contribution speaks. Fit means your reviewers are the people your related-work section is in dialogue with"
      - id: timing-and-repro-finalized
        description: "Timing is back-planned from the deadline, and the reproduction package is finalized AT submission. For a conference, work backward: full draft complete at least four weeks out, co-author internal-review round by two weeks out, whole paper frozen (changes only, no additions) one week out — which means writing starts no later than six weeks before the deadline. Whether to post to arXiv early is checked WORD-FOR-WORD against that venue's anonymity policy. The repro/ directory forge accumulated is finalized now: ANONYMIZED (author paths, institution names, personal tokens removed — a job to hand the agent to scan for), a license added, and a clean-environment smoke test re-run so 'works on my machine' is caught before a reviewer hits it"

  - name: rebuttal
    checks:
      - id: comments-classified-48h
        description: "The rebuttal starts with the 48-HOUR RULE and a CLASSIFICATION. The first read of reviews triggers an emotional response (usually anger plus feeling wronged) that is not admissible as input to any decision; read once, wait two days, read again — half the apparent 'malice' turns out to be misunderstanding. Then classify every comment and set a per-class strategy: MISUNDERSTANDING (the reviewer misread — which is really a WRITING problem; easiest to answer: point to the text, apologize for the unclear phrasing, give the fix); NEEDS-AN-EXPERIMENT (see the next check); FUNDAMENTAL DISAGREEMENT (polite but firm, cite evidence not emotion: 'we respectfully disagree, because...'); REVIEWER-IS-WRONG (the most dangerous, because they hold a vote — give them a ladder: 'this is an easy point to confuse; we have added a clarification in Section X', packaging 'you were wrong' as 'we wrote it unclearly')"
      - id: responses-four-beat-evidence
        description: "Each response runs FOUR BEATS and exploits the agent era's one real change to rebuttal. The four beats per point: restate the concern (prove you understood it) -> respond -> evidence (a number, or a precise location in the paper) -> a concrete revision promise (down to the section number, and NEVER a promise you cannot keep). The agent-era change: the rebuttal window used to allow almost no new experiments; now forge's one-command-regeneration pipeline plus an agent operator make adding a baseline, an ablation, or a scale tier realistic within days — so, WHERE THE VENUE'S AUTHOR-RESPONSE POLICY PERMITS A NEW EXPERIMENT (checked word-for-word like the anonymity policy; some venues forbid new results in the response, some have no response phase at all), 'if you can add it, ACTUALLY add the number', the single most persuasive form of response. Allocate limited rebuttal words by the battle map: spend them on the BORDERLINE reviewer who clearly read the paper; the two extremes rarely move. Finally, have a clean agent session play that reviewer and rehearse how they will counter-attack your response"

  - name: persist
    checks:
      - id: revise-before-resubmit
        description: "After a rejection: archive, revise, and ladder — never blast. First file ALL reviews into the 历程 (the append-only lab notebook) verbatim — a rejection is free deep consultation from several domain experts. Then the iron discipline: REVISE the main issues BEFORE submitting to the next venue, NEVER fire the identical paper at the next one — the field is small, the same paper landing on the same reviewer (not unlikely) is reputation damage. Plan a two-or-three-tier resubmission LADDER in advance (ideal venue -> same-tier backup -> safe option); after each rejection, fix per the reviews and drop one tier, so the worst case is still monotonically rising paper quality. a rejection or two before acceptance is common and expected in many fields, not your failure"
      - id: camera-ready-checklist
        description: "On acceptance, the camera-ready stage runs a fixed CHECKLIST, because this is where careless final errors enter: acknowledgments and grant/funding numbers added; the paper DE-ANONYMIZED (every anonymization undone); the final numbers RE-VERIFIED against the results store one last time (the manuscript and the single source of truth must still agree after all the rebuttal-round edits); and the arXiv version synced to the camera-ready. This closes the loop forge opened: every number in the published paper still traces, bit-for-bit, to a run id"
