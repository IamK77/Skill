# Flight checklist for the ledger skill — experiment design as a protocol frozen
# BEFORE the run, 7 stages, hard GATEs. SKILL.md addresses stages by NAME
# (checklist verify <name> / check <name> <id>), so the 0-based index never
# surfaces. STAGE N headings in SKILL.md map to these stages in order: matrix ->
# firewall -> instances -> baselines -> stats -> ablation -> freeze. The output is a
# frozen experiment-protocol document (claim-evidence matrix, instance list,
# baseline list + tuning protocol, metric + statistics plan, ablation + sensitivity
# plan, compute budget + schedule) plus a piloted pipeline — ready for the
# full-scale run and result analysis (later inquiry skills).
phases:
  - name: matrix
    checks:
      - id: matrix-bidirectional
        description: "The experiment protocol opens with a CLAIM-EVIDENCE MATRIX that maps the two or three claims (inherited from crucible's spec) to the experiments that support them — written BEFORE any formal experiment runs, because writing the protocol first is what prevents 'run a pile of experiments then cherry-pick the good-looking ones into a story', which is the experiment-version of p-hacking and which reviewers smell instantly. The matrix is checked BOTH ways: a claim with no supporting experiment must get an experiment added or the claim deleted; an experiment that serves no claim is simply not run (the saved machine-hours are the point). This document doubles as the paper's experiments chapter and the reproduction package's README — one investment, three returns"
      - id: verdicts-pre-written
        description: "For each claim, the JUDGMENT criteria are written down in advance — what result counts as SUPPORT ('median better than all baselines on the main table AND a paired test is significant'), what counts as PARTIAL support requiring the claim to be weakened ('wins only on one instance class'), and what counts as REFUTATION. Writing the negation condition BEFORE seeing data is the line between honest research and post-hoc story-fitting: you cannot move the goalposts after the ball is kicked if you wrote where they stand first"

  - name: firewall
    checks:
      - id: phases-split
        description: "The work is explicitly split into an EXPLORATION phase and a CONFIRMATION phase, and their data NEVER mix — the keystone discipline, borrowed from pre-registered research. EXPLORATION (chaos testing, the MVP, randomly kicking the system) is high-value and fast — its job is to GENERATE HYPOTHESES ('component X seems to drag on large instances', 'results jump once parameter p crosses a threshold'), which go into an append-only history/notebook file. But exploration numbers NEVER enter the paper: because you noticed a pattern only after looking at many results, that pattern has a real chance of being noise fished out, and reporting it as a conclusion is unconscious p-hacking. CONFIRMATION takes the believed findings, writes them as explicit hypotheses with the pre-written verdicts above, and re-runs them on NEW instances and NEW seeds under the frozen protocol. Exploration discovers what MIGHT be true; confirmation proves what IS — and the two phases' data are kept apart"
      - id: runs-provenance-stamped
        description: "Even the messy exploration runs are made REPRODUCIBLE so a finding can later be hardened: every run, however casual, AUTO-LOGS its git commit hash, full config, seed, and data version into the result file, so each entry in the history file needs only a run ID to be replayed exactly (the cure for 'three weeks ago I noted an amazing result and now can't reproduce it because I hand-edited a few lines and kept no record'). The append-only history file is paired with a REWRITABLE companion (e.g. state.md) that the agent periodically distills from it — the current snapshot of believed conclusions (each pointing back to its evidence entries), open hypotheses, and confirmed dead ends — and the agent is additionally tasked with detecting SELF-CONTRADICTION across months ('entry 47's observation conflicts with entry 213's conclusion') and answering 'have I tried something like this before?' before any new experiment. The history file is the append-only log; the companion is the living world-view distilled from it"

  - name: instances
    checks:
      - id: instances-three-layer
        description: "The instance/dataset set is built in three layers, each with a distinct job. LAYER 1, recognized public BENCHMARKS — for comparability, so a reviewer can hold your numbers against the literature (not skippable); and a specific trap is defused first by having the agent inventory how every paper in the field actually USES the same-named benchmark, because the SAME benchmark often carries DIFFERENT preprocessing, subset splits, and metric conventions across papers — you must state which one you align to. LAYER 2, REAL/industrial instances — for realism (especially valued in OR). LAYER 3, your own CONTROLLED SYNTHETIC generator — for mechanism analysis: it carries difficulty knobs (scale, constraint tightness, randomness strength, structural parameters) so you can draw 'performance vs. factor' curves (the main support for mechanism claims), and its code and seeds are published with the paper or reviewers will suspect you picked a favorable distribution"
      - id: leakage-guarded
        description: "Data LEAKAGE is guarded against explicitly wherever a learning component is involved: time-series data is split BY TIME, never randomly (a random split lets the future leak into training); hyperparameters are tuned ONLY on a validation set; and the TEST set is touched exactly ONCE, at the very end. Leakage is the silent failure that makes a method look brilliant in development and collapse on deployment — and the agent, optimizing for a good-looking number, will not flag it for you"

  - name: baselines
    checks:
      - id: baselines-four-classes
        description: "Four classes of baseline are included, each with a job: the recent strong SOTA (MANDATORY — without it the whole comparison is invalid, and beating only old/weak methods convinces no one); one or two classic strong methods (the field's consensus reference frame); a simple/brute baseline (greedy, random, or brute-force-with-more-compute — its job is to calibrate the problem's difficulty FLOOR; if you only beat the simple baseline by a little, there is no story); and your method's own ablation versions. A main comparison missing the recent strong SOTA is the single most common fatal flaw a reviewer cites"
      - id: fairness-protocol-fixed
        description: "The FAIRNESS protocol is fixed in writing, because fairness is the most-attacked part of review. Four things nailed down: SAME hardware and time budget for every method; prefer the authors' ORIGINAL code and report your reproduced number SIDE BY SIDE with the paper's claimed number (matching raises whole-table credibility; a mismatch is explained as to its source); the SAME TUNING BUDGET — every method including yours gets the same hyperparameter search space, the same search budget, and the same search procedure, because 'the baseline ran on default parameters' is self-sabotage today (and this is an agent leverage point: hand each baseline's tuning to the agent as a batch job run to the full budget); and finally, have the agent compile a table of the baselines' original-paper experimental-setting differences (hardware, time limit, preprocessing) and disclose it proactively in an appendix, putting the incomparability factors on the table before a reviewer does"

  - name: stats
    checks:
      - id: metrics-primary-secondary
        description: "Metrics are split into PRIMARY (tied to the core claims — solution quality, optimality gap, objective value) and SECONDARY (recording the cost — run time, memory, convergence speed), so the headline result and its price are both reported and neither hides the other. For OR / optimization comparisons across many methods and instances, a PERFORMANCE PROFILE (Dolan-Moré curve) is strongly recommended — it is the field's standard language for exactly that comparison, and one figure replaces three tables"
      - id: stats-protocol-sound
        description: "The statistics protocol is specified, not improvised. The number of seeds/repeats is set by first ESTIMATING the variance in a pilot run (raise it where variance is high), not by a guess; report mean +/- standard deviation, switching to median + interquartile range when the distribution is skewed; use a PAIRED test (the paired Wilcoxon signed-rank test, because your method and a baseline score on the SAME instances are paired, and the paired test is far more sensitive than mixing two piles of numbers); apply a MULTIPLE-COMPARISON correction (Holm or Bonferroni) when comparing several methods at once; and report the EFFECT SIZE, not only the p-value — 'significant but only 0.4% faster' and 'significant and 15% faster' are two different papers. Timing is measured cleanly: exclude IO and one-time compilation, run the decisive comparisons serially or on an exclusive node to avoid resource contention, and record the hardware in the protocol"

  - name: ablation
    checks:
      - id: ablation-and-sensitivity-planned
        description: "The ablation, sensitivity, and scaling experiments are planned, reusing crucible's pre-wired switches and three null doubles (off / random / cheap-heuristic). The ABLATION table runs each switch combination under the SAME protocol, instances, and seeds as the full method; when components are many, the standard structure is two routes — 'full method, minus one component at a time' and 'baseline, plus one component at a time' — rather than the full combinatorial grid. The SENSITIVITY scan picks the two or three most critical hyperparameters and sweeps them on the controlled generator to demonstrate a WIDE robust interval ('performance varies under 3% across two orders of magnitude' is far more convincing than 'we tuned carefully to the optimum', which signals fragility). The SCALING experiment follows the generator's scale knob to verify the complexity analysis's predictions"
      - id: failure-analysis-planned
        description: "A FAILURE-CASE analysis is planned as its own section: experiments deliberately designed to show on which instance class the method does NOT work and why (usually the situation where one of the method's assumptions is violated). This is a deliberate trade — a small amount of paper space bought for a large amount of reviewer trust — and it is exactly what a careful reviewer looks for to believe the rest of the results are honest"

  - name: freeze
    checks:
      - id: budget-accounted-and-piloted
        description: "The compute BUDGET is totalled before anything runs at scale: methods x instances x seeds x per-run time. Coming out over budget is the normal case and is precisely the protocol's value — it forces the cut to happen BEFORE the run (drop seeds, sample instances, trim a secondary sensitivity sweep), not halfway through when you are out of resources and forced to cut the MAIN experiment. Scheduling runs a small-scale PILOT first whose purpose is to validate the whole chain — submit, monitor, retry-on-failure, persist, auto-summarize-into-a-table — NOT to look at the numbers, then scales up in the order main table -> ablation -> sensitivity -> extension. The agent's role here is experiment OPERATOR (batch-submit, watch jobs, auto-retry failures with the reason logged, periodically summarize persisted results into comparison tables); yours shrinks to two things — audit the protocol, and investigate anomalies (a suspiciously-good number triggers a feasibility-and-leakage check FIRST, never a celebration)"
      - id: protocol-frozen-with-changelog
        description: "The protocol is FROZEN once finalized. Discovering mid-experiment that it genuinely needs changing (a benchmark is flawed, a metric is ill-defined) is normal; the ONLY thing separating an honest adjustment from p-hacking is a PAPER TRAIL: every change is recorded in an append-only CHANGELOG stating what changed, why, and AFTER SEEING WHICH RESULTS it changed. That changelog is your evidence if a reviewer ever questions the experimental setup. The exit condition for the whole stage: the protocol document is frozen, the pilot run has exercised the full pipeline end to end, and the compute budget balances"
