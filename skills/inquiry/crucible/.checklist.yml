# Flight checklist for the crucible skill — method design as a measured elimination
# tournament, 7 stages, hard GATEs. SKILL.md addresses stages by NAME (checklist
# verify <name> / check <name> <id>), so the 0-based index never surfaces. STAGE N
# headings in SKILL.md map to these stages in order: spec -> ceiling -> variants ->
# tournament -> theory -> ablation -> novelty. The surviving, deepened method (with
# small-scale empirical evidence, pre-wired ablation switches, and a defended
# novelty claim) is what crucible hands forward to ledger (experiment design).
phases:
  - name: spec
    checks:
      - id: spec-is-decidable
        description: "The design spec is written as a three-column table — HARD constraints (direct translation of the gap statement; violating one is disqualifying), SOFT constraints (quantified, negotiable trade-offs), and FREE design space (fully open) — and EVERY line is DECIDABLE: a measurable acceptance test, not a platitude. '方法要快 / the method should be fast' is noise; 'median solve time on the scaffold instance set is within 2x the baseline's' is a spec. The efficient check: hand the gap statement to the agent and have it rewrite each requirement as a measurable acceptance criterion AND explicitly flag the ones it cannot — the un-rewritable lines are exactly the requirements you have not yet thought through, and they are work to do now, not later"
      - id: spec-is-claim-draft
        description: "The spec is recognized as the DRAFT of the paper's claims — its second identity. Write down now the two or three sentences the finished paper must make a reader believe; the spec is the verifiable-ized version of those sentences. From here on every experiment exists to collect evidence for one of those claims, and any work that serves no claim is work you can NOT do — the single biggest time-saver across method design and experiment design. (These claims become ledger's claim-evidence matrix; if you cannot yet state them, the gap from prospect is not sharp enough to design against.)"

  - name: ceiling
    checks:
      - id: oracle-ladder-built
        description: "The performance CEILING is measured as a LADDER, not a single 'everything-on' number — oracles are opened ONE LEVEL AT A TIME. Know the oracle typology, because 'cheating' has several forms: INFORMATION oracle (a predictor uses true future values; parameters use ground-truth values), COMPUTATION oracle (a subproblem is solved exactly by brute force; the time budget is set to infinite), TUNING oracle (hyperparameters tuned directly on the test set), COMPONENT oracle (one module in the pipeline is replaced by ground-truth output). Two construction rules: the oracle's evaluation METRIC must match the final main experiment (else the ceiling is not comparable), and the ladder is measured at AT LEAST TWO scale tiers (a small instance's bottleneck structure can differ completely from a large one's)"
      - id: ceiling-justifies-direction
        description: "The ladder is READ for three payoffs before any variant is built. (1) The TOTAL gap (baseline -> full-oracle ceiling) says whether the direction is worth doing at all — a low ceiling kills it now, cheaply. (2) The INTER-LEVEL gaps are each component's MARGINAL value, and they aim the STAGE 2 'replacement' variant at the component worth investing in (a prediction module with a 9.5 gap obviously beats a sub-solver with a 1.3 gap). (3) The REVERSE signal is treated as equally precious: if opening an oracle level moves performance not at all, the bottleneck is NOT where you thought — a finding that can by itself veto half your candidate variants. (And the ladder is the future paper's motivation figure, drawn for free.)"

  - name: variants
    checks:
      - id: variants-death-orthogonal
        description: "The two or three variants taken into the tournament have ORTHOGONAL death-causes — each bets on a DIFFERENT thing. If all three bet on the same assumption (e.g. 'demand is predictable'), that one assumption falling wipes out the whole field; when each bets differently, the tournament teaches you something about the PROBLEM no matter who wins. The generation patterns and their characteristic deaths are understood: COMBINATION (graft, e.g. generative model for the initial solution + classical local search to refine — dies if the graft point is unnatural and the two halves drag each other down, so you must be able to argue 'A's output is exactly what B most needs as input'); REPLACEMENT (swap the biggest-gap component the STAGE 1 ladder identified — dies if you swap a non-bottleneck and the gain is eaten by the real bottleneck); RELAXATION (relax an assumption — the death is in EVALUATION, the old benchmark may no longer apply so you must build a new protocol, near-doubling the work, but the new benchmark you define gets cited); STRUCTURE-EXPLOITATION (three entry points: the problem's dual form, the constraint matrix's sparsity/block pattern, the statistical regularities of real instance data — dies if the structure exists only in your synthetic data, so verify it on real instances FIRST); LEARNING-AUGMENTED (the most hidden death: inference time eats back the solve time you saved, so this variant reports END-TO-END total time from the prototype, never the solve phase alone)"
      - id: variants-have-fourfold
        description: "Every candidate carries the four-piece set before it enters discussion: (1) the mechanism in ONE sentence, (2) its most-likely death cause, (3) a one-day minimal validation experiment, (4) its delta vs the nearest existing work. A candidate missing any of the four does not get discussed — the four-piece set is the entry ticket. (Brainstorm with the agent by giving it the spec, the prospect close-reading notes, and the death log together, and requiring the four-piece set on each candidate it proposes.)"

  - name: tournament
    checks:
      - id: scaffold-trustworthy
        description: "The tournament runs on a TRUSTWORTHY scaffold: one config file defines the variant × instance × seed grid, one command runs it all and persists STRUCTURED results (CSV / SQLite), one command emits the comparison table. Two IRON rules guard correctness. (1) ONE metric-computation codebase, shared by every variant — letting each variant compute its own metric is the number-one source of misaligned experiments. (2) An INDEPENDENT feasibility checker that shares NO logic with any solver, run on EVERY produced solution — this is the strongest weapon against the agent's silent bugs: a variant whose performance 'soars' is, nine times out of ten, producing INFEASIBLE solutions. The small instance set is chosen to be DISCRIMINATING (the baseline does well on some and badly on others — a set the baseline aces or fails uniformly cannot resolve differences) and to cover the matrix cell you are targeting; plus a small HELD-OUT set used for NO decision ever, run every couple of weeks, to catch the design quietly over-fitting to the tournament instances"
      - id: kill-criteria-pre-committed
        description: "The elimination criteria are written down, in black and white, BEFORE the first variant runs (e.g. 'killed if its median is no better than the baseline on both scale tiers'). The reason is human, not technical: people grow attached to a variant they implemented themselves, so a kill standard set AFTER seeing the results will always be watered down. Pre-commit the kill, then let it kill — and aim each rule at the competitor the variant must beat to JUSTIFY ITS EXISTENCE (a dynamic variant vs the best static one, a learned component vs the best hand-tuned one), not merely the baseline everything clears, or a variant survives while failing the very thing it was added to prove"
      - id: deaths-logged
        description: "Every eliminated variant is recorded in a DEATH LOG with fixed fields: variant name, mechanism assumption, the key evidence numbers, the death-cause CLASSIFICATION (implementation bug / mechanism assumption falsified / tied by a simple baseline / engineering-infeasible), and the revival condition. The classification is load-bearing: a variant that died of a BUG deserves a fix and a re-trial, while one that died of a FALSIFIED ASSUMPTION is buried together with every other candidate that bet on the same assumption. (This log is the append-only experiment notebook ledger relies on — see ledger's exploration/confirmation firewall.)"

  - name: theory
    checks:
      - id: claims-survived-counterexample-search
        description: "Before any proof is attempted, each theoretical proposition is ATTACKED with three counterexample-search weapons: SMALL-SCALE EXHAUSTION (enumerate the entire instance space where it is enumerable), PROPERTY-DRIVEN RANDOM GENERATION (sample near the assumption's BOUNDARY — counterexamples almost always hide in degenerate cases: the empty set, a single point, a parameter at 0 or going to infinity, a constraint exactly binding), and AGENT PROPERTY-BASED TESTING (have the agent encode the proposition as automated property tests with a framework like Python's hypothesis, which actively does boundary-shrinking search). A proposition proven false here is a finding obtained cheaply; only one that survives all three is worth opening a proof on. (If the contribution is purely EMPIRICAL with no theoretical claim, this stage is consciously recorded as N/A with that reason — an honest skip, never a silent one.)"
      - id: proofs-laundering-checked
        description: "Proofs are produced by the five-beat human-agent protocol AND guarded against 'proof laundering'. The protocol: you give the proposition and a proof-sketch skeleton -> the agent fills in the details -> you hand-verify line by line -> a FRESH agent session plays a hostile reviewer attacking specifically (boundary cases, the direction of inequalities, the dependence of constants on parameters, whether 'without loss of generality' truly loses none) -> you patch and attack again. The laundering risk MUST be named: an agent's proof always READS fluent and confident, and the errors hide precisely under the connective phrases — 'by X it easily follows', 'without loss of generality', 'similarly'. The verification rule: every such phrase is forcibly EXPANDED into a full derivation, and one that cannot be expanded is treated as a HOLE. Theory DEPTH is calibrated to the target venue (pull the theory sections of three-to-five recent comparable papers and match their depth — no more, no less). A high-ROI default to consider: the DEGENERATE-SPECIAL-CASE theorem — set one of your method's parameters to 0 or infinity and prove it reduces to a known classical method (a correctness sanity check, a positioning of your work as that method's generalization, and usually easy to prove). (N/A with reason if the contribution is purely empirical.)"

  - name: ablation
    checks:
      - id: ablation-prewired
        description: "Ablation is PRE-WIRED into the implementation, not retrofitted: every 'switch' is a CONFIG item, never commented-out code, and each component's interface reserves THREE null doubles — IDENTITY (turn it off), RANDOM (same interface, random output), and CHEAP-HEURISTIC (the most naive possible implementation). The reason is the standard reviewers actually apply: a convincing ablation is not merely 'it gets worse when turned off' (which only shows the component is USED) but 'a cheap substitute can't match it either' (which shows your intricate design is NECESSARY) — and the latter is exactly what a reviewer challenges"
      - id: complexity-budgeted
        description: "Complexity is held to a BUDGET: two new components is the sweet spot for one paper; three or more and the story blurs and the ablation table explodes. The discipline is made concrete by DRAWING THE FUTURE PAPER'S EMPTY ABLATION TABLE NOW — one row per switch combination, one column per metric — because the act of drawing it immediately exposes which components cannot be isolated and which combinations are too many to run, both signals that the design needs simplifying. Three brute-force contestants stay resident in the tournament as honesty checks: the baseline with 10x the time budget, the baseline with a large hyperparameter random search, and (if your method has a learning component) your method's most-naive learning version"

  - name: novelty
    checks:
      - id: mechanism-search-run
        description: "A SECOND adversarial existence search is run, differing from prospect's first round precisely in the SEARCH TERMS: the first round used PROBLEM keywords ('dynamic vehicle routing'); this round uses MECHANISM keywords ('decompose constraint class Y via structure X', 'fuse prediction and optimization in manner Z'). Mechanism words are what hook the papers that study a DIFFERENT problem but use the SAME technique — exactly the 'have you seen this one?' a reviewer most loves to produce. The search scope is pushed down to workshop papers, technical reports, and un-published arXiv preprints"
      - id: deltas-have-verifiable-consequence
        description: "Each near-neighbor is written up with the fixed difference template — 'X also uses technique A, but for purpose B / under assumption C; our difference is D, and this difference causes result E' — where E MUST be a VERIFIABLE consequence; a difference with no E is a decorative difference and fools no reviewer. The CLAIM wording is calibrated to the novelty TYPE: a new mechanism may say 'we propose a novel...'; a new combination should say 'we are the first to combine... and show that...'; a new application may only say 'we adapt... to the setting of... which requires non-trivially addressing...' — using the wrong tier is a high-frequency cause of being hammered in rebuttal. And the defensive-citation rule holds: cite ALL near-neighbors and discuss the differences openly in related work, which always beats betting the reviewer hasn't read one — proactive discussion shows command of the field, while a pointed-out omission undermines the novelty itself"
